<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Tankey ❤️ Monody</title>
  <link rel="icon" href="/love/love.png" />
  <link rel="shortcut icon" href="/love/love.png" />
  <style>
:root{
--bg:#f5f5f7;
--panel:rgba(255,255,255,.85);
--text:#111;
--soft:#6e6e73;
--line:rgba(0,0,0,.08);
--shadow:0 18px 54px rgba(0,0,0,.08);
--radius:24px;
}

*{box-sizing:border-box}
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang SC","Helvetica Neue",sans-serif;
background:var(--bg);
color:var(--text);
}

.topbar{
position:sticky;
top:0;
background:rgba(255,255,255,.7);
backdrop-filter:blur(16px);
border-bottom:1px solid var(--line);
}

.topbar-inner{
max-width:1200px;
margin:auto;
padding:14px 24px;
display:flex;
justify-content:space-between;
}

.shell{
max-width:1200px;
margin:auto;
padding:24px;
display:grid;
grid-template-columns:1fr 420px;
gap:20px;
}

.stage{
background:var(--panel);
border-radius:var(--radius);
border:1px solid var(--line);
box-shadow:var(--shadow);
display:flex;
align-items:center;
justify-content:center;
min-height:60vh;
overflow:hidden;
}

.stage img{
max-width:100%;
max-height:100%;
padding:30px;
object-fit:contain;
}

.info{
background:var(--panel);
border-radius:var(--radius);
border:1px solid var(--line);
box-shadow:var(--shadow);
padding:20px;
display:flex;
flex-direction:column;
gap:16px;
}

.group{
border-radius:16px;
border:1px solid var(--line);
padding:14px 16px;
}

.group-title{
font-size:16px;
font-weight:600;
margin-bottom:10px;
}

.meta-row{
display:grid;
grid-template-columns:120px 1fr;
font-size:14px;
padding:4px 0;
}

.meta-label{
color:var(--soft);
}

.histogram-box{
height:140px;
background:#fafafa;
border-radius:12px;
border:1px solid var(--line);
display:flex;
align-items:center;
justify-content:center;
}

.map-box iframe{
width:100%;
height:200px;
border:0;
border-radius:12px;
}

.hidden{
display:none;
}

@media(max-width:900px){
.shell{
grid-template-columns:1fr;
}
}
</style>
</head>

<body>

<header class="topbar">
<div class="topbar-inner">
<div>Tankey ❤️ Monody</div>
<div>Photo Detail</div>
</div>
</header>

<main class="shell">

<section class="stage">
<img id="photo" src="sample.jpg" alt="photo">
</section>

<aside class="info">

<section id="basic-group" class="group hidden">
<div class="group-title">基本信息</div>
<div id="basic-list"></div>
</section>

<section id="shoot-group" class="group hidden">
<div class="group-title">拍摄参数</div>
<div id="shoot-list"></div>
</section>

<section id="device-group" class="group hidden">
<div class="group-title">设备信息</div>
<div id="device-list"></div>
</section>

<section id="mode-group" class="group hidden">
<div class="group-title">拍摄模式</div>
<div id="mode-list"></div>
</section>

<section id="tech-group" class="group hidden">
<div class="group-title">技术参数</div>
<div id="tech-list"></div>
</section>

<section id="hist-group" class="group hidden">
<div class="group-title">直方图</div>
<div class="histogram-box" id="histogram"></div>
</section>

<section id="map-group" class="group hidden">
<div class="group-title">地图</div>
<div class="map-box" id="map"></div>
</section>

</aside>

</main>

<script src="https://cdn.jsdelivr.net/npm/exifr/dist/lite.umd.js"></script>

<script>

const img = document.getElementById("photo")

function row(label,value){
return `<div class="meta-row">
<div class="meta-label">${label}</div>
<div>${value}</div>
</div>`
}

function renderGroup(id,list,data){
const valid=data.filter(x=>x[1])
if(!valid.length) return
document.getElementById(id).classList.remove("hidden")
document.getElementById(list).innerHTML=valid.map(x=>row(x[0],x[1])).join("")
}

function renderHistogram(image){

const canvas=document.createElement("canvas")
canvas.width=256
canvas.height=120

const ctx=canvas.getContext("2d")

const temp=document.createElement("canvas")
const tctx=temp.getContext("2d")

temp.width=256
temp.height=Math.round(image.height*(256/image.width))

tctx.drawImage(image,0,0,temp.width,temp.height)

const data=tctx.getImageData(0,0,temp.width,temp.height).data

const bins=new Array(256).fill(0)

for(let i=0;i<data.length;i+=4){
const lum=Math.round(0.2126*data[i]+0.7152*data[i+1]+0.0722*data[i+2])
bins[lum]++
}

const max=Math.max(...bins)

ctx.beginPath()
ctx.moveTo(0,120)

bins.forEach((v,i)=>{
const y=120-(v/max)*110
ctx.lineTo(i,y)
})

ctx.lineTo(256,120)
ctx.fillStyle="#333"
ctx.fill()

document.getElementById("histogram").appendChild(canvas)
document.getElementById("hist-group").classList.remove("hidden")

}

async function loadExif(){

let raw=null

try{
raw=await exifr.parse(img.src,{gps:true})
}catch(e){}

if(!raw) return

renderGroup("basic-group","basic-list",[
["拍摄时间",raw.DateTimeOriginal],
["分辨率",img.naturalWidth+" × "+img.naturalHeight],
["像素",(img.naturalWidth*img.naturalHeight/1000000).toFixed(2)+" MP"]
])

renderGroup("shoot-group","shoot-list",[
["焦距",raw.FocalLength?raw.FocalLength+" mm":null],
["光圈",raw.FNumber?"f/"+raw.FNumber:null],
["曝光时间",raw.ExposureTime?raw.ExposureTime+" s":null],
["ISO",raw.ISO]
])

renderGroup("device-group","device-list",[
["相机",raw.Model],
["镜头",raw.LensModel]
])

renderGroup("mode-group","mode-list",[
["白平衡",raw.WhiteBalance],
["测光模式",raw.MeteringMode]
])

renderGroup("tech-group","tech-list",[
["亮度",raw.BrightnessValue]
])

if(raw.latitude && raw.longitude){

document.getElementById("map-group").classList.remove("hidden")

document.getElementById("map").innerHTML=
`<iframe src="https://www.openstreetmap.org/export/embed.html?marker=${raw.latitude},${raw.longitude}"></iframe>`
}

renderHistogram(img)

}

img.onload=()=>loadExif()

</script>

</body>
</html>
