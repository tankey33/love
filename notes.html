<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Tankey ❤️ Monody</title>
  <link rel="icon" href="./love.png" />
  <link rel="shortcut icon" href="./love.png" />
  <style>
    :root{--bg:#fff;--text:#1d1d1f;--text-soft:#6e6e73;--line:rgba(0,0,0,.08);--content:1200px;--hero:1080px;--feed:1040px}
    *{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","PingFang SC","Helvetica Neue",sans-serif;color:var(--text);background:var(--bg);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility} a{color:inherit;text-decoration:none}
    .topbar{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.82);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-bottom:1px solid rgba(0,0,0,.06)}
    .topbar-inner{max-width:var(--content);margin:0 auto;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px}.brand{font-size:14px;letter-spacing:.02em;white-space:nowrap}.nav{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end}.nav a{font-size:13px;color:var(--text-soft);padding:10px 14px;border-radius:999px}.nav a:hover,.nav a.active{background:rgba(17,17,17,.05);color:var(--text)}
    .hero{max-width:var(--hero);margin:0 auto;padding:58px 24px 24px;text-align:center}.hero-kicker{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--text-soft)}.hero-title{margin:14px auto 0;max-width:12em;font-size:clamp(42px,8vw,86px);line-height:1.02;letter-spacing:-.055em;font-weight:600}.hero-desc{margin:20px auto 0;max-width:760px;font-size:clamp(17px,2.2vw,24px);line-height:1.7;color:var(--text-soft)}
    .feed{max-width:var(--feed);margin:0 auto;padding:8px 24px 60px;display:grid;gap:18px}.post{display:block;padding:28px 0;border-bottom:1px solid var(--line)}.post-date{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-soft)}.post-title{margin:10px 0 0;max-width:14em;font-size:clamp(30px,5vw,58px);line-height:1.04;letter-spacing:-.045em;font-weight:600}.post-summary{margin:16px 0 0;max-width:760px;font-size:16px;line-height:1.85;color:var(--text-soft)}.post:hover .post-title{opacity:.84}
    .empty{padding:22px 0;font-size:15px;line-height:1.8;color:var(--text-soft)}
    @media (max-width:640px){.topbar-inner,.hero,.feed{padding-left:16px;padding-right:16px}.hero{padding-top:36px}.hero-title{font-size:clamp(32px,12vw,52px);max-width:100%}.hero-desc{font-size:15px;max-width:22em}.post{padding:22px 0}.post-title{font-size:clamp(26px,9vw,38px);max-width:100%}.post-summary{font-size:15px;line-height:1.75}}
  </style>
</head>
<body>
  <header class="topbar"><div class="topbar-inner"><a class="brand" href="index.html">Tankey ❤️ Monody</a><nav class="nav"><a href="index.html">首页</a><a href="photo.html">照片</a><a href="notes.html" class="active">碎碎念</a></nav></div></header>
  <section class="hero"><div class="hero-kicker">Newsroom</div><h1 class="hero-title">把零散的想法，写成值得认真阅读的内容。</h1><p class="hero-desc">这里不只是备忘录，也不是模板化博客。它更像一个小型新闻页：安静、完整、克制，把图片和文字都放在正确的位置上。</p></section>
  <main class="feed" id="post-list"></main>
  <script>
    async function loadPosts() {
      const list = document.getElementById('post-list');
      try {
        const res = await fetch('blog/posts.json?_=' + Date.now());
        const posts = await res.json();
        const visible = posts.filter(post => post.slug !== 'README');
        if (!visible.length) {
          list.innerHTML = '<div class="empty">这里还没有文章。</div>';
          return;
        }
        list.innerHTML = visible.map(post => `<a class="post" href="note.html?slug=${encodeURIComponent(post.slug)}"><div class="post-date">${post.date || 'Undated'}</div><h2 class="post-title">${post.title}</h2><p class="post-summary">${post.summary || ''}</p></a>`).join('');
      } catch (e) { list.innerHTML = '<div class="empty">这里还没有文章。</div>'; }
    }
    loadPosts();
  </script>
</body>
</html>
