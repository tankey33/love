<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Tankey ❤️ Monody</title>
  <link rel="icon" href="/love/love.png" />
  <link rel="shortcut icon" href="/love/love.png" />
  <style>
    :root { --bg:#f5f5f7; --text:#111; --text-soft:#6e6e73; --line:rgba(17,17,17,.06); --shadow:0 12px 36px rgba(0,0,0,.06); --content:1380px; }
    *{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","PingFang SC","Helvetica Neue",sans-serif;color:var(--text);background:radial-gradient(circle at top,rgba(255,255,255,.96) 0%,rgba(255,255,255,.42) 24%,rgba(245,245,247,1) 58%),linear-gradient(180deg,#fafafd 0%,#f5f5f7 100%);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility} a{color:inherit;text-decoration:none}
    .topbar{position:sticky;top:0;z-index:50;backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);background:rgba(245,245,247,.78);border-bottom:1px solid rgba(17,17,17,.04)}
    .topbar-inner{max-width:var(--content);margin:0 auto;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px}.brand{font-size:14px;letter-spacing:.08em;white-space:nowrap}.nav{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end}.nav a{font-size:13px;color:var(--text-soft);padding:10px 14px;border-radius:999px}.nav a:hover,.nav a.active{background:rgba(17,17,17,.05);color:var(--text)}
    .hero{max-width:1120px;margin:0 auto;padding:56px 24px 26px;text-align:center}.hero-title{margin:0;font-size:clamp(36px,7vw,84px);line-height:1.04;letter-spacing:-.05em;font-weight:600}.hero-desc{margin:18px auto 0;max-width:820px;font-size:clamp(16px,2vw,22px);line-height:1.65;color:var(--text-soft)}
    .feed{max-width:980px;margin:0 auto;padding:8px 24px 56px;display:grid;gap:14px}.post{display:block;background:rgba(255,255,255,.74);border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);padding:22px}.post-date{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-soft)}.post-title{margin:10px 0 0;font-size:clamp(24px,4vw,40px);line-height:1.06;letter-spacing:-.04em}.post-summary{margin:12px 0 0;font-size:15px;line-height:1.9;color:var(--text-soft)}
    .empty{background:rgba(255,255,255,.74);border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);padding:22px;font-size:15px;line-height:1.8;color:var(--text-soft)}
    @media (max-width:520px){.topbar-inner,.hero,.feed{padding-left:16px;padding-right:16px}.hero-title{font-size:clamp(30px,12vw,52px)}}
  </style>
</head>
<body>
  <header class="topbar"><div class="topbar-inner"><a class="brand" href="index.html">Tankey ❤️ Monody</a><nav class="nav"><a href="index.html">首页</a><a href="photo.html">照片</a><a href="notes.html" class="active">碎碎念</a></nav></div></header>
  <section class="hero"><h1 class="hero-title">把零散的想法，也认真排好。</h1><p class="hero-desc">记一点当天的情绪、灵感、随手的小事。安静，克制，但该有的阅读体验都保留。</p></section>
  <main class="feed" id="post-list"></main>
  <script>
    async function loadPosts() {
      const list = document.getElementById('post-list');
      try {
        const res = await fetch('blog/posts.json?_=' + Date.now());
        const posts = await res.json();
        if (!posts.length) {
          list.innerHTML = '<div class="empty">这里还没有文章。</div>';
          return;
        }
        list.innerHTML = posts.map(post => `<a class="post" href="note.html?slug=${encodeURIComponent(post.slug)}"><div class="post-date">${post.date || 'Undated'}</div><h2 class="post-title">${post.title}</h2><p class="post-summary">${post.summary || ''}</p></a>`).join('');
      } catch (e) { list.innerHTML = '<div class="empty">这里还没有文章。</div>'; }
    }
    loadPosts();
  </script>
</body>
</html>
