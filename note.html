<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Tankey ❤️ Monody</title>

<link rel="icon" href="./love.png"/>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/styles/github.min.css"/>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css"/>

<style>

:root{
--bg:#f6f6f4;
--text:#1d1d1f;
--muted:#8a8a8f;
--line:rgba(0,0,0,.08);
--shadow:0 10px 30px rgba(0,0,0,.04);
--content:720px;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang SC","Helvetica Neue",sans-serif;
background:var(--bg);
color:var(--text);
}

.topbar{
position:sticky;
top:0;
background:rgba(255,255,255,.8);
backdrop-filter:blur(12px);
border-bottom:1px solid var(--line);
}

.topbar-inner{
max-width:1100px;
margin:auto;
padding:14px 24px;
display:flex;
justify-content:space-between;
}

.brand{
font-size:14px;
font-weight:500;
}

.nav a{
font-size:13px;
margin-left:10px;
padding:6px 12px;
border-radius:999px;
}

.page{
max-width:1100px;
margin:auto;
padding:48px 24px;
display:grid;
grid-template-columns:220px minmax(0,var(--content)) 1fr;
gap:32px;
}

.toc{
position:sticky;
top:100px;
font-size:13px;
}

.toc a{
display:block;
margin:6px 0;
color:#666;
}

.hero{
text-align:center;
margin-bottom:36px;
}

.meta{
font-size:12px;
letter-spacing:.14em;
color:var(--muted);
}

#post-title{
font-size:clamp(28px,4vw,44px);
line-height:1.35;
margin-top:10px;
}

.summary{
max-width:560px;
margin:10px auto 0;
color:#777;
}

.content{
font-size:17px;
line-height:2;
}

.content h2{
margin-top:2em;
font-size:28px;
}

.content h3{
margin-top:1.6em;
font-size:22px;
}

.content pre{
background:#f7f7f7;
border-radius:12px;
overflow:auto;
}

.content pre code{
display:block;
padding:18px;
font-size:14px;
}

.code-wrap{
position:relative;
margin:1.4em 0;
}

.copy-btn{
position:absolute;
top:8px;
right:8px;
font-size:12px;
padding:6px 10px;
border-radius:999px;
border:none;
background:#111;
color:white;
cursor:pointer;
}

.content table{
width:100%;
border-collapse:collapse;
}

.content th,
.content td{
border-bottom:1px solid var(--line);
padding:10px;
}

@media (max-width:900px){
.page{
grid-template-columns:1fr;
}
.toc{
display:none;
}
}

</style>
</head>

<body>

<header class="topbar">
<div class="topbar-inner">
<div class="brand">Tankey ❤️ Monody</div>
<nav class="nav">
<a href="index.html">首页</a>
<a href="photo.html">照片</a>
<a href="notes.html">碎碎念</a>
</nav>
</div>
</header>

<main class="page">

<aside class="toc">
<div id="toc-list"></div>
</aside>

<article>

<header class="hero">
<div class="meta" id="post-date"></div>
<h1 id="post-title"></h1>
<div class="summary" id="post-summary"></div>
</header>

<section class="content" id="post-content"></section>

</article>

</main>


<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/lib/common.min.js"></script>

<script defer
src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>

<script defer
src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>


<script>

function stripFrontMatter(md){
return md.replace(/^---[\s\S]*?---/,'').trim()
}

function parseMarkdown(md){
if(marked.parse){
return marked.parse(md)
}
return marked(md)
}

async function loadPost(){

const slug=new URLSearchParams(location.search).get("slug")

if(!slug)return

const posts=await fetch("blog/posts.json?_="+Date.now()).then(r=>r.json())

const post=posts.find(p=>p.slug===slug)

if(!post)return

document.title=post.title

document.getElementById("post-title").textContent=post.title
document.getElementById("post-date").textContent=post.date
document.getElementById("post-summary").textContent=post.summary||""

const md=await fetch(post.path+"?_="+Date.now()).then(r=>r.text())

const html=parseMarkdown(stripFrontMatter(md))

const container=document.getElementById("post-content")

container.innerHTML=html

container.querySelectorAll("pre code").forEach(el=>{
hljs.highlightElement(el)
})

container.querySelectorAll("pre").forEach(pre=>{

const wrap=document.createElement("div")
wrap.className="code-wrap"

const btn=document.createElement("button")
btn.className="copy-btn"
btn.textContent="复制"

btn.onclick=async()=>{
await navigator.clipboard.writeText(pre.innerText)
btn.textContent="已复制"
setTimeout(()=>btn.textContent="复制",1200)
}

pre.parentNode.insertBefore(wrap,pre)
wrap.appendChild(btn)
wrap.appendChild(pre)

})

if(window.renderMathInElement){

renderMathInElement(container,{
delimiters:[
{left:"$$",right:"$$",display:true},
{left:"$",right:"$",display:false}
]
})

}

buildTOC(container)

}

function buildTOC(container){

const list=document.getElementById("toc-list")

list.innerHTML=""

container.querySelectorAll("h2,h3").forEach(h=>{

const id=h.innerText.replace(/\s+/g,"-")

h.id=id

const a=document.createElement("a")

a.href="#"+id

a.textContent=h.innerText

list.appendChild(a)

})

}

loadPost()

</script>

</body>
</html>
