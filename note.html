<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>

<title>Tankey ❤️ Monody</title>

<link rel="icon" href="/love/love.png"/>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/styles/github.min.css">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">

<style>

:root{
--bg:#f5f5f7;
--text:#111;
--text-soft:#6e6e73;
--line:rgba(17,17,17,.06);
--shadow:0 12px 36px rgba(0,0,0,.06);
--content:980px;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang SC","Helvetica Neue",sans-serif;
color:var(--text);
background:#f5f5f7;
-webkit-font-smoothing:antialiased;
}

a{
text-decoration:none;
color:inherit
}

/* 顶部栏 */

.topbar{
position:sticky;
top:0;
z-index:50;
background:rgba(245,245,247,.8);
backdrop-filter:blur(20px);
border-bottom:1px solid var(--line);
}

.topbar-inner{
max-width:1380px;
margin:auto;
padding:14px 24px;
display:flex;
justify-content:space-between;
}

.brand{
font-size:14px;
letter-spacing:.08em
}

.nav{
display:flex;
gap:8px
}

.nav a{
font-size:13px;
padding:10px 14px;
border-radius:999px;
color:var(--text-soft)
}

.nav a:hover{
background:#eee;
color:#111
}

/* 页面 */

.wrap{
max-width:var(--content);
margin:auto;
padding:44px 24px
}

.paper{
background:#fff;
border-radius:26px;
padding:32px;
box-shadow:var(--shadow);
border:1px solid var(--line);
}

/* 标题 */

.meta{
font-size:12px;
color:var(--text-soft);
letter-spacing:.14em;
text-transform:uppercase;
}

h1#post-title{
margin:12px 0 0;
font-size:clamp(28px,4vw,46px);
line-height:1.2;
word-break:break-word;
}

/* 内容 */

.content{
margin-top:26px;
font-size:17px;
line-height:1.9;
}

.content h2{
margin-top:1.8em;
font-size:28px;
}

.content img{
max-width:100%;
border-radius:16px;
}

/* 代码 */

.code-wrap{
position:relative;
margin:1.6em 0;
}

.copy-btn{
position:absolute;
top:8px;
right:10px;
background:#111;
color:#fff;
border:none;
border-radius:999px;
font-size:12px;
padding:6px 12px;
cursor:pointer;
}

.content pre{
border-radius:14px;
overflow:auto;
border:1px solid var(--line);
}

.content pre code{
padding:16px;
display:block;
font-size:14px;
}

/* 表格 */

.content table{
width:100%;
border-collapse:collapse;
overflow:auto;
display:block;
}

.content th,.content td{
padding:8px 10px;
border-bottom:1px solid var(--line);
}

</style>
</head>

<body>

<header class="topbar">
<div class="topbar-inner">
<a class="brand" href="index.html">Tankey ❤️ Monody</a>

<nav class="nav">
<a href="index.html">首页</a>
<a href="photo.html">照片</a>
<a href="notes.html">碎碎念</a>
</nav>

</div>
</header>


<main class="wrap">

<article class="paper">

<div class="meta" id="post-date"></div>

<h1 id="post-title">Loading...</h1>

<div class="content" id="post-content"></div>

</article>

</main>


<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/lib/common.min.js"></script>

<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>

<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>


<script>

marked.setOptions({
highlight:function(code,lang){
if(lang && hljs.getLanguage(lang)){
return hljs.highlight(code,{language:lang}).value
}
return hljs.highlightAuto(code).value
}
})

async function loadPost(){

const slug=new URLSearchParams(location.search).get("slug")

if(!slug)return

const posts=await fetch("blog/posts.json").then(r=>r.json())

const post=posts.find(p=>p.slug===slug)

if(!post)return

document.title=post.title+" · Tankey ❤️ Monody"

document.getElementById("post-title").textContent=post.title
document.getElementById("post-date").textContent=post.date||""

const md=await fetch(post.path).then(r=>r.text())

const html=marked.parse(md.replace(/^---[\s\S]*?---/,""))

const container=document.getElementById("post-content")

container.innerHTML=html

/* 代码高亮 */

container.querySelectorAll("pre code").forEach(block=>{
hljs.highlightElement(block)
})

/* 复制按钮 */

container.querySelectorAll("pre").forEach(pre=>{

const wrap=document.createElement("div")
wrap.className="code-wrap"

const btn=document.createElement("button")
btn.className="copy-btn"
btn.textContent="复制"

btn.onclick=async()=>{
await navigator.clipboard.writeText(pre.innerText)
btn.textContent="已复制"
setTimeout(()=>btn.textContent="复制",1200)
}

pre.parentNode.insertBefore(wrap,pre)
wrap.appendChild(btn)
wrap.appendChild(pre)

})

/* 数学公式 */

if(window.renderMathInElement){

renderMathInElement(container,{
delimiters:[
{left:"$$",right:"$$",display:true},
{left:"$",right:"$",display:false}
]
})

}

}

loadPost()

</script>

</body>
</html>
