<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Tankey ❤️ Monody</title>
  <link rel="icon" href="/love/love.png" />
  <link rel="shortcut icon" href="/love/love.png" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/styles/github.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <style>
    :root { --bg:#f5f5f7; --text:#111; --text-soft:#6e6e73; --line:rgba(17,17,17,.06); --shadow:0 12px 36px rgba(0,0,0,.06); --content:980px; }
    *{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","PingFang SC","Helvetica Neue",sans-serif;color:var(--text);background:radial-gradient(circle at top,rgba(255,255,255,.96) 0%,rgba(255,255,255,.42) 24%,rgba(245,245,247,1) 58%),linear-gradient(180deg,#fafafd 0%,#f5f5f7 100%);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility} a{color:inherit;text-decoration:none}
    .topbar{position:sticky;top:0;z-index:50;backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);background:rgba(245,245,247,.78);border-bottom:1px solid rgba(17,17,17,.04)}
    .topbar-inner{max-width:1380px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px}.brand{font-size:14px;letter-spacing:.08em;white-space:nowrap}.nav{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end}.nav a{font-size:13px;color:var(--text-soft);padding:10px 14px;border-radius:999px}.nav a:hover,.nav a.active{background:rgba(17,17,17,.05);color:var(--text)}
    .wrap{max-width:var(--content);margin:0 auto;padding:44px 24px 56px}.paper{background:rgba(255,255,255,.82);border:1px solid var(--line);border-radius:28px;box-shadow:var(--shadow);padding:28px;overflow:hidden}.meta{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-soft)} h1#post-title{margin:12px 0 0;font-size:clamp(34px,6vw,62px);line-height:1.08;letter-spacing:-.05em;max-width:100%;word-break:break-word;overflow-wrap:anywhere;text-wrap:balance}
    .content{margin-top:28px;font-size:17px;line-height:1.95;max-width:100%;overflow-wrap:break-word;word-break:break-word}.content h1,.content h2,.content h3{letter-spacing:-.03em;line-height:1.15;max-width:100%;overflow-wrap:anywhere}.content h2{margin-top:2em;font-size:30px}.content p{margin:1em 0}.content blockquote{margin:1.6em 0;padding-left:1em;border-left:4px solid #111;color:var(--text-soft)}.content img{max-width:100%;border-radius:18px;box-shadow:var(--shadow)}.content table{width:100%;border-collapse:collapse;display:block;overflow-x:auto}.content th,.content td{border-bottom:1px solid var(--line);padding:10px 12px;text-align:left;white-space:nowrap}
    .code-wrap{position:relative;margin:1.4em 0}.copy-btn{position:absolute;top:10px;right:10px;border:none;background:#111;color:#fff;border-radius:999px;padding:8px 12px;font-size:12px;cursor:pointer;z-index:2}.content pre{margin:0;border-radius:18px;overflow:auto;background:#f6f8fa;border:1px solid var(--line)}.content pre code{display:block;padding:18px;font-size:14px;line-height:1.7}.katex-display{overflow:auto hidden;padding:6px 0}
    @media (max-width:520px){.topbar-inner,.wrap{padding-left:16px;padding-right:16px}.paper{padding:20px}.content{font-size:16px}.meta{font-size:11px}.wrap{padding-top:28px}.content h2{font-size:24px}h1#post-title{font-size:clamp(28px,10vw,40px);line-height:1.12}}
  </style>
</head>
<body>
  <header class="topbar"><div class="topbar-inner"><a class="brand" href="index.html">Tankey ❤️ Monody</a><nav class="nav"><a href="index.html">首页</a><a href="photo.html">照片</a><a href="notes.html" class="active">碎碎念</a></nav></div></header>
  <main class="wrap"><article class="paper"><div class="meta" id="post-date">Loading</div><h1 id="post-title">Loading...</h1><div class="content" id="post-content"></div></article></main>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/lib/common.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
  <script>
    marked.setOptions({ highlight(code, lang) { return hljs.highlightAuto(code, lang ? [lang] : undefined).value; } });
    async function loadPost() {
      const slug = new URLSearchParams(location.search).get('slug');
      if (!slug) return;
      const posts = await fetch('blog/posts.json?_=' + Date.now()).then(r => r.json());
      const post = posts.find(p => p.slug === slug);
      if (!post) { document.getElementById('post-title').textContent = '文章不存在'; document.getElementById('post-date').textContent=''; return; }
      document.title = `${post.title} · Tankey ❤️ Monody`;
      document.getElementById('post-title').textContent = post.title;
      document.getElementById('post-date').textContent = post.date || '';
      const md = await fetch(post.path + '?_=' + Date.now()).then(r => r.text());
      const html = marked.parse(md.replace(/^---[\s\S]*?---\n/, ''));
      const container = document.getElementById('post-content');
      container.innerHTML = html;
      container.querySelectorAll('pre').forEach(pre => {
        const wrap = document.createElement('div'); wrap.className = 'code-wrap';
        const btn = document.createElement('button'); btn.className = 'copy-btn'; btn.textContent = '复制';
        btn.onclick = async () => { const text = pre.innerText; await navigator.clipboard.writeText(text); btn.textContent = '已复制'; setTimeout(()=>btn.textContent='复制',1200); };
        pre.parentNode.insertBefore(wrap, pre); wrap.appendChild(btn); wrap.appendChild(pre);
      });
      if (window.renderMathInElement) {
        renderMathInElement(container, { delimiters: [ {left:'$$', right:'$$', display:true}, {left:'$', right:'$', display:false} ] });
      }
    }
    loadPost();
  </script>
</body>
</html>
