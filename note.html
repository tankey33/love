<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Tankey ❤️ Monody</title>
<link rel="icon" href="./love.png"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/styles/github.min.css"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css"/>
<style>
:root{--bg:#fff;--text:#1d1d1f;--muted:#6e6e73;--line:rgba(0,0,0,.08);--content:860px;--hero:1040px;--link:#0066cc;--code-bg:#111318;--code-line:#2a2d36;--code-text:#eef2ff;--code-key:#ff7ab8;--code-fn:#82aaff;--code-str:#c3e88d;--code-num:#f78c6c;}
*{box-sizing:border-box;margin:0;padding:0} body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","PingFang SC","Helvetica Neue",sans-serif;background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility} a{color:inherit;text-decoration:none}
.topbar{position:sticky;top:0;background:rgba(255,255,255,.82);backdrop-filter:saturate(180%) blur(18px);border-bottom:1px solid var(--line);z-index:100}.topbar-inner{max-width:1200px;margin:0 auto;padding:14px 24px;display:flex;justify-content:space-between;align-items:center}.brand{font-size:14px;font-weight:500;letter-spacing:.02em}.nav{display:flex;gap:8px}.nav a{font-size:13px;padding:6px 12px;border-radius:999px;color:var(--muted)}.nav a:hover{background:rgba(0,0,0,.04);color:var(--text)}
.page{padding:40px 24px 64px}.hero{max-width:var(--hero);margin:0 auto 42px;text-align:center}.eyebrow{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:14px}.hero h1{font-size:clamp(34px,6vw,68px);line-height:1.06;letter-spacing:-.045em;font-weight:600;max-width:14em;margin:0 auto;word-break:break-word;overflow-wrap:anywhere}.summary{max-width:780px;margin:20px auto 0;color:var(--muted);font-size:clamp(16px,2vw,22px);line-height:1.7}.article-shell{max-width:var(--content);margin:0 auto}.content{font-size:19px;line-height:1.95;word-break:break-word;overflow-wrap:anywhere}.content h1,.content h2,.content h3{margin-top:2.2em;margin-bottom:.55em;line-height:1.2;font-weight:600;letter-spacing:-.03em}.content h1{font-size:40px}.content h2{font-size:31px}.content h3{font-size:24px}.content p{margin:1.15em 0}.content ul,.content ol{margin:1.15em 0;padding-left:1.5em}.content li{margin:.45em 0}.content a{color:var(--link);text-decoration:underline;text-underline-offset:3px;word-break:break-word}.content a:hover{opacity:.82}.content strong{font-weight:600}.content pre{background:linear-gradient(180deg,#141821 0%,#0f1218 100%);border:1px solid rgba(255,255,255,.06);border-radius:18px;overflow-x:auto;margin:1.8em 0;box-shadow:0 12px 30px rgba(0,0,0,.14)}.content pre code{display:block;padding:20px;font-size:13px;line-height:1.8;background:transparent;white-space:pre;color:var(--code-text);font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono",monospace}.content pre code .hljs-keyword,.content pre code .hljs-selector-tag,.content pre code .hljs-literal{color:var(--code-key)}.content pre code .hljs-title,.content pre code .hljs-title.function_,.content pre code .hljs-function .hljs-title,.content pre code .hljs-built_in{color:var(--code-fn)}.content pre code .hljs-string,.content pre code .hljs-doctag{color:var(--code-str)}.content pre code .hljs-number,.content pre code .hljs-attr,.content pre code .hljs-attribute{color:var(--code-num)}.content pre code .hljs-comment{color:#7f8c98}.content pre code .hljs-variable,.content pre code .hljs-template-variable{color:#ffcb6b}.content pre code .hljs-meta,.content pre code .hljs-meta .hljs-keyword{color:#89ddff}.content pre code .hljs-operator,.content pre code .hljs-punctuation{color:#c792ea}.content pre code .hljs-params{color:#f8f8f2}.code-wrap{position:relative;margin:1.8em 0}.copy-btn{position:absolute;top:12px;right:12px;font-size:11px;padding:6px 10px;border-radius:999px;border:none;background:rgba(255,255,255,.14);color:#fff;cursor:pointer;backdrop-filter:blur(8px)}.content table{width:100%;border-collapse:collapse;margin:1.8em 0;display:block;overflow-x:auto}.content th,.content td{border-bottom:1px solid var(--line);padding:14px 12px;text-align:left;font-size:14px;white-space:nowrap}.content img{max-width:100%;height:auto;border-radius:22px;margin:1.8em 0;display:block;box-shadow:0 10px 30px rgba(0,0,0,.06)}.content blockquote{margin:1.8em 0;padding:18px 20px;border-left:4px solid #111;background:#fafafa;border-radius:0 16px 16px 0;color:#555}.content blockquote p{margin:0}.content hr{border:none;border-top:1px solid var(--line);margin:2.4em 0}.content code:not(pre code){background:rgba(0,0,0,.05);padding:2px 7px;border-radius:7px;font-size:.88em}.katex-display{overflow-x:auto;overflow-y:hidden;padding:8px 0}.post-footer-meta{margin-top:40px;padding-top:18px;border-top:1px solid var(--line);text-align:right;font-size:12px;letter-spacing:.14em;color:var(--muted);text-transform:uppercase}
@media (max-width:640px){.topbar-inner{padding:12px 16px}.page{padding:28px 16px 44px}.hero{margin-bottom:30px}.hero h1{font-size:clamp(28px,10vw,42px);max-width:100%}.summary{margin-top:14px;font-size:15px;line-height:1.75}.content{font-size:16px;line-height:1.88}.content h2{font-size:24px}.content h3{font-size:20px}.content pre code{padding:16px;font-size:12px}.post-footer-meta{margin-top:30px;padding-top:14px;font-size:11px}}
</style>
</head>
<body>
<header class="topbar"><div class="topbar-inner"><a class="brand" href="index.html">Tankey ❤️ Monody</a><nav class="nav"><a href="index.html">首页</a><a href="photo.html">照片</a><a href="notes.html">碎碎念</a></nav></div></header>
<main class="page"><article><header class="hero"><div class="eyebrow">Newsroom</div><h1 id="post-title"></h1><div class="summary" id="post-summary"></div></header><div class="article-shell"><section class="content" id="post-content"></section><div class="post-footer-meta" id="post-date"></div></div></article></main>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/lib/common.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
<script>
(async function(){
  const slug=new URLSearchParams(window.location.search).get('slug');
  if(!slug){document.getElementById('post-title').textContent='未指定文章';return;}
  try{
    const posts=await fetch('blog/posts.json?t='+Date.now()).then(r=>r.json());
    const post=posts.find(p=>p.slug===slug);
    if(!post){document.getElementById('post-title').textContent='文章不存在';return;}
    document.title=post.title+' · Tankey ❤️ Monody';
    document.getElementById('post-title').textContent=post.title;
    document.getElementById('post-date').textContent=post.date||'';
    document.getElementById('post-summary').textContent=post.summary||'';
    const html=await fetch((post.renderedPath||post.path)+'?t='+Date.now()).then(r=>r.text());
    const container=document.getElementById('post-content');
    container.innerHTML=html;
    if(window.hljs && typeof window.hljs.highlightElement === 'function'){
      container.querySelectorAll('pre code').forEach(el=>window.hljs.highlightElement(el));
    }
    container.querySelectorAll('pre').forEach(pre=>{
      const wrap=document.createElement('div');wrap.className='code-wrap';
      const btn=document.createElement('button');btn.className='copy-btn';btn.textContent='复制';
      btn.onclick=async()=>{try{await navigator.clipboard.writeText(pre.innerText);btn.textContent='已复制';setTimeout(()=>btn.textContent='复制',1500);}catch(e){btn.textContent='复制失败';}};
      pre.parentNode.insertBefore(wrap,pre);wrap.appendChild(btn);wrap.appendChild(pre);
    });
    if(window.renderMathInElement){renderMathInElement(container,{delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}],throwOnError:false});}
  }catch(e){document.getElementById('post-content').innerHTML='<p>加载失败：'+e.message+'</p>';}
})();
</script>
</body>
</html>
