<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Tankey ❤️ Monody</title>

  <link rel="icon" href="./love.png" />
  <link rel="shortcut icon" href="./love.png" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/styles/github.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" />

  <style>
    :root{
      --bg:#f6f6f4;
      --card:#ffffff;
      --text:#1d1d1f;
      --muted:#8a8a8f;
      --line:rgba(0,0,0,.08);
      --soft-line:rgba(0,0,0,.05);
      --shadow:0 10px 30px rgba(0,0,0,.04);
      --content:720px;
      --toc:220px;
      --radius:22px;
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      color:var(--text);
      background:var(--bg);
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","PingFang SC","Hiragino Sans GB","Microsoft YaHei","Helvetica Neue",Arial,sans-serif;
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    img{
      max-width:100%;
      display:block;
    }

    .topbar{
      position:sticky;
      top:0;
      z-index:100;
      background:rgba(246,246,244,.78);
      backdrop-filter:saturate(180%) blur(18px);
      -webkit-backdrop-filter:saturate(180%) blur(18px);
      border-bottom:1px solid rgba(0,0,0,.04);
    }

    .topbar-inner{
      max-width:1280px;
      margin:0 auto;
      padding:14px 24px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
    }

    .brand{
      font-size:14px;
      font-weight:500;
      color:#5f84b2;
      letter-spacing:.02em;
      white-space:nowrap;
    }

    .nav{
      display:flex;
      align-items:center;
      gap:6px;
      flex-wrap:wrap;
    }

    .nav a{
      font-size:13px;
      color:#666;
      padding:8px 12px;
      border-radius:999px;
      transition:.2s ease;
    }

    .nav a:hover,
    .nav a.active{
      color:#111;
      background:rgba(0,0,0,.05);
    }

    .page{
      max-width:1280px;
      margin:0 auto;
      padding:48px 24px 96px;
      display:grid;
      grid-template-columns:minmax(0,1fr) minmax(0,var(--content)) minmax(0,1fr);
      gap:32px;
    }

    .toc-wrap{
      position:relative;
    }

    .toc{
      position:sticky;
      top:90px;
      width:var(--toc);
      padding:18px 16px;
      border:1px solid var(--soft-line);
      border-radius:18px;
      background:rgba(255,255,255,.72);
      backdrop-filter:blur(10px);
      box-shadow:var(--shadow);
    }

    .toc-title{
      font-size:12px;
      color:var(--muted);
      letter-spacing:.12em;
      text-transform:uppercase;
      margin-bottom:12px;
    }

    .toc-list{
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .toc-list a{
      font-size:13px;
      line-height:1.5;
      color:#666;
      transition:.2s ease;
      word-break:break-word;
    }

    .toc-list a:hover{
      color:#111;
    }

    .article{
      min-width:0;
    }

    .hero{
      text-align:center;
      margin-bottom:42px;
      padding-top:12px;
    }

    .meta{
      font-size:12px;
      letter-spacing:.14em;
      text-transform:uppercase;
      color:var(--muted);
      margin-bottom:16px;
    }

    #post-title{
      margin:0 auto;
      max-width:100%;
      font-size:clamp(28px,4.2vw,48px);
      line-height:1.32;
      font-weight:500;
      letter-spacing:-0.02em;
      word-break:break-word;
      overflow-wrap:anywhere;
      text-wrap:balance;
    }

    .summary{
      margin:18px auto 0;
      max-width:560px;
      color:#7a7a80;
      font-size:15px;
      line-height:1.8;
    }

    .content{
      max-width:var(--content);
      margin:0 auto;
      font-size:17px;
      line-height:2;
      color:var(--text);
    }

    .content > *:first-child{
      margin-top:0;
    }

    .content p{
      margin:1.1em 0;
    }

    .content h1,
    .content h2,
    .content h3,
    .content h4{
      color:#111;
      letter-spacing:-0.02em;
      scroll-margin-top:100px;
    }

    .content h1{
      font-size:34px;
      line-height:1.35;
      margin:2em 0 .7em;
    }

    .content h2{
      font-size:28px;
      line-height:1.4;
      margin:2.2em 0 .8em;
    }

    .content h3{
      font-size:22px;
      line-height:1.45;
      margin:1.8em 0 .7em;
    }

    .content h4{
      font-size:18px;
      line-height:1.5;
      margin:1.6em 0 .6em;
    }

    .content ul,
    .content ol{
      padding-left:1.4em;
      margin:1em 0;
    }

    .content li{
      margin:.45em 0;
    }

    .content blockquote{
      margin:1.6em 0;
      padding:4px 0 4px 18px;
      border-left:3px solid #d7d7db;
      color:#666;
    }

    .content hr{
      border:none;
      border-top:1px solid var(--line);
      margin:2.4em 0;
    }

    .content img{
      width:100%;
      border-radius:18px;
      margin:1.6em 0;
      box-shadow:var(--shadow);
    }

    .content a{
      color:#2459d3;
      text-decoration:none;
      border-bottom:1px solid rgba(36,89,211,.18);
    }

    .content strong{
      font-weight:600;
    }

    .content code:not(pre code){
      font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono",monospace;
      background:#f3f3f5;
      border:1px solid rgba(0,0,0,.05);
      border-radius:8px;
      padding:.15em .45em;
      font-size:.92em;
    }

    .code-wrap{
      position:relative;
      margin:1.5em 0;
    }

    .copy-btn{
      position:absolute;
      top:12px;
      right:12px;
      border:none;
      background:rgba(255,255,255,.92);
      color:#111;
      border-radius:999px;
      padding:7px 12px;
      font-size:12px;
      line-height:1;
      cursor:pointer;
      box-shadow:0 2px 10px rgba(0,0,0,.06);
      border:1px solid rgba(0,0,0,.06);
      transition:.2s ease;
      z-index:3;
    }

    .copy-btn:hover{
      background:#fff;
      transform:translateY(-1px);
    }

    .content pre{
      margin:0;
      overflow:auto;
      border-radius:18px;
      border:1px solid rgba(0,0,0,.06);
      background:#f8f8f8;
      box-shadow:var(--shadow);
    }

    .content pre code{
      display:block;
      padding:20px 18px;
      font-size:14px;
      line-height:1.75;
      font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono",monospace;
    }

    .content table{
      width:100%;
      border-collapse:collapse;
      margin:1.5em 0;
      display:block;
      overflow-x:auto;
      border-spacing:0;
    }

    .content thead tr{
      background:#fafafa;
    }

    .content th,
    .content td{
      padding:12px 14px;
      border-bottom:1px solid rgba(0,0,0,.08);
      text-align:left;
      white-space:nowrap;
      font-size:15px;
    }

    .content figure{
      margin:1.8em 0;
    }

    .content figcaption{
      text-align:center;
      color:var(--muted);
      font-size:13px;
      margin-top:.8em;
    }

    .katex-display{
      overflow:auto hidden;
      padding:8px 2px;
      margin:1.2em 0;
    }

    .foot{
      max-width:var(--content);
      margin:56px auto 0;
      padding-top:20px;
      border-top:1px solid var(--line);
      color:var(--muted);
      font-size:13px;
      text-align:center;
    }

    .empty-toc{
      display:none;
    }

    @media (max-width:1100px){
      .page{
        grid-template-columns:minmax(0,1fr);
      }
      .toc-wrap{
        display:none;
      }
      .article{
        max-width:var(--content);
        width:100%;
        margin:0 auto;
      }
    }

    @media (max-width:720px){
      .topbar-inner{
        padding:12px 16px;
      }

      .page{
        padding:28px 16px 72px;
      }

      #post-title{
        font-size:clamp(24px,8vw,34px);
        line-height:1.42;
      }

      .content{
        font-size:16px;
        line-height:1.9;
      }

      .content h1{font-size:28px}
      .content h2{font-size:24px}
      .content h3{font-size:20px}

      .copy-btn{
        top:10px;
        right:10px;
        padding:6px 10px;
      }

      .content pre code{
        padding:18px 14px;
        font-size:13px;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="index.html">Tankey ❤️ Monody</a>
      <nav class="nav">
        <a href="index.html">首页</a>
        <a href="photo.html">照片</a>
        <a href="notes.html" class="active">碎碎念</a>
      </nav>
    </div>
  </header>

  <main class="page">
    <aside class="toc-wrap">
      <div class="toc" id="toc-box">
        <div class="toc-title">目录</div>
        <div class="toc-list" id="toc-list"></div>
      </div>
    </aside>

    <article class="article">
      <header class="hero">
        <div class="meta" id="post-date">Loading</div>
        <h1 id="post-title">Loading...</h1>
        <div class="summary" id="post-summary"></div>
      </header>

      <section class="content" id="post-content"></section>

      <footer class="foot">
        <span>Tankey ❤️ Monody</span>
      </footer>
    </article>

    <div></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/lib/common.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>

  <script>
    const renderer = new marked.Renderer();

    renderer.heading = function(text, level) {
      const plain = String(text).replace(/<[^>]+>/g, "");
      const slug = plain
        .trim()
        .toLowerCase()
        .replace(/[^\u4e00-\u9fa5a-z0-9\s-]/gi, "")
        .replace(/\s+/g, "-");
      return `<h${level} id="${slug}">${text}</h${level}>`;
    };

    marked.setOptions({
      renderer,
      gfm: true,
      breaks: false
    });

    function stripFrontMatter(md) {
      return md.replace(/^---[\s\S]*?---\s*/, "");
    }

    function extractSummary(md) {
      const clean = stripFrontMatter(md)
        .replace(/```[\s\S]*?```/g, "")
        .replace(/\$\$[\s\S]*?\$\$/g, "")
        .replace(/`.*?`/g, "")
        .replace(/!\[.*?\]\(.*?\)/g, "")
        .replace(/\[([^\]]+)\]\([^)]+\)/g, "$1")
        .replace(/^#{1,6}\s+/gm, "")
        .replace(/>\s?/g, "")
        .replace(/[-*+]\s+/g, "")
        .replace(/\n+/g, " ")
        .trim();

      return clean.slice(0, 90) + (clean.length > 90 ? "..." : "");
    }

    function renderCodeBlocks(container) {
      container.querySelectorAll("pre code").forEach(code => {
        hljs.highlightElement(code);
      });

      container.querySelectorAll("pre").forEach(pre => {
        if (pre.parentElement && pre.parentElement.classList.contains("code-wrap")) return;

        const wrap = document.createElement("div");
        wrap.className = "code-wrap";

        const btn = document.createElement("button");
        btn.className = "copy-btn";
        btn.type = "button";
        btn.textContent = "复制";

        btn.addEventListener("click", async () => {
          const text = pre.innerText;
          try {
            await navigator.clipboard.writeText(text);
            btn.textContent = "已复制";
            setTimeout(() => btn.textContent = "复制", 1200);
          } catch (e) {
            btn.textContent = "复制失败";
            setTimeout(() => btn.textContent = "复制", 1200);
          }
        });

        pre.parentNode.insertBefore(wrap, pre);
        wrap.appendChild(btn);
        wrap.appendChild(pre);
      });
    }

    function renderMath(container) {
      if (!window.renderMathInElement) return;
      renderMathInElement(container, {
        delimiters: [
          { left: "$$", right: "$$", display: true },
          { left: "$", right: "$", display: false }
        ],
        throwOnError: false
      });
    }

    function buildTOC(container) {
      const tocList = document.getElementById("toc-list");
      const tocBox = document.getElementById("toc-box");
      tocList.innerHTML = "";

      const headings = [...container.querySelectorAll("h2, h3")];
      if (!headings.length) {
        tocBox.classList.add("empty-toc");
        return;
      }

      tocBox.classList.remove("empty-toc");

      headings.forEach(h => {
        if (!h.id) return;
        const a = document.createElement("a");
        a.href = "#" + h.id;
        a.textContent = h.textContent;
        a.style.paddingLeft = h.tagName === "H3" ? "12px" : "0";
        tocList.appendChild(a);
      });
    }

    async function loadPost() {
      const params = new URLSearchParams(location.search);
      const slug = params.get("slug");

      if (!slug) {
        document.getElementById("post-title").textContent = "缺少文章参数";
        document.getElementById("post-date").textContent = "";
        return;
      }

      try {
        const posts = await fetch("blog/posts.json?_=" + Date.now()).then(r => r.json());
        const post = posts.find(p => p.slug === slug);

        if (!post) {
          document.getElementById("post-title").textContent = "文章不存在";
          document.getElementById("post-date").textContent = "";
          return;
        }

        document.title = `${post.title} · Tankey ❤️ Monody`;
        document.getElementById("post-title").textContent = post.title;
        document.getElementById("post-date").textContent = post.date || "";

        const md = await fetch(post.path + "?_=" + Date.now()).then(r => r.text());

        document.getElementById("post-summary").textContent =
          post.summary || extractSummary(md);

        const html = marked.parse(stripFrontMatter(md));
        const container = document.getElementById("post-content");
        container.innerHTML = html;

        renderCodeBlocks(container);
        renderMath(container);
        buildTOC(container);
      } catch (err) {
        document.getElementById("post-title").textContent = "加载失败";
        document.getElementById("post-date").textContent = "";
        document.getElementById("post-content").innerHTML =
          "<p>文章读取失败，请检查 posts.json 路径或 markdown 文件路径是否正确。</p>";
        console.error(err);
      }
    }

    loadPost();
  </script>
</body>
</html>
