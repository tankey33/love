<!DOCTYPE html><html lang="zh-CN"><head><meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" /><title>Tankey ❤️ Monody · Music</title><link rel="icon" href="./love.png" /><link rel="shortcut icon" href="./love.png" /><style>:root{--bg:#f5f5f7;--panel:#fbfbfd;--text:#1d1d1f;--soft:#6e6e73;--line:rgba(0,0,0,.06);--shadow:0 12px 36px rgba(0,0,0,.04);--content:1560px}*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","PingFang SC","Helvetica Neue",sans-serif;color:var(--text);background:radial-gradient(circle at top, rgba(255,255,255,.95) 0%, rgba(255,255,255,.45) 26%, transparent 56%),linear-gradient(180deg,#fafafd 0%, var(--bg) 100%);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}a{color:inherit;text-decoration:none}.topbar{position:sticky;top:0;z-index:50;background:rgba(245,245,247,.82);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-bottom:1px solid rgba(0,0,0,.05)}.topbar-inner{max-width:var(--content);margin:0 auto;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px}.brand{font-size:14px;letter-spacing:.02em;white-space:nowrap}.nav{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end}.nav a{font-size:13px;color:var(--soft);padding:10px 14px;border-radius:999px;transition:background .25s ease,color .25s ease}.nav a:hover,.nav a.active{background:rgba(17,17,17,.05);color:var(--text)}.page{max-width:var(--content);margin:0 auto;padding:26px 20px 56px}.hero{display:grid;grid-template-columns:minmax(0,1fr) 420px;gap:32px;align-items:start;margin-bottom:20px}.hero-copy{display:flex;flex-direction:column;justify-content:flex-start;align-self:start;min-height:220px;padding:2px 8px 0 0}.eyebrow{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--soft);font-weight:600;margin:0 0 10px}.hero-title{margin:0;font-size:clamp(30px,4.4vw,56px);line-height:1.04;letter-spacing:-.055em;font-weight:600;text-wrap:balance;max-width:9em}.hero-panel{background:linear-gradient(180deg, rgba(255,255,255,.98) 0%, rgba(250,250,252,.94) 100%);border:1px solid var(--line);border-radius:28px;box-shadow:var(--shadow);padding:18px 18px 14px;min-height:196px;display:flex;flex-direction:column;justify-content:flex-start;align-self:start;width:100%;max-width:420px}.panel-label{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--soft);font-weight:600;margin:0 0 10px}.panel-quote{margin:0;font-size:clamp(17px,1.9vw,24px);line-height:1.12;letter-spacing:-.03em;font-weight:600;max-width:10ch;text-wrap:balance}.panel-source{margin-top:8px;font-size:12px;line-height:1.5;color:var(--soft)}.section{margin:0 0 16px}.stats{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}.stat-pill{padding:8px 12px;border-radius:999px;background:rgba(255,255,255,.76);box-shadow:var(--shadow);font-size:12px;color:var(--soft)}.toolbar{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:14px}.section-title{font-size:22px;line-height:1.15;letter-spacing:-.04em;font-weight:600;margin:0}.search-box{position:relative;flex:0 0 280px;max-width:280px;width:100%}.search-box input{width:100%;height:42px;padding:0 14px 0 40px;border:none;border-radius:999px;background:rgba(255,255,255,.88);box-shadow:var(--shadow);color:var(--text);outline:none;font-size:13px}.search-box input::placeholder{color:#9b9ba1}.search-icon{position:absolute;left:15px;top:50%;transform:translateY(-50%);color:var(--soft);font-size:13px}.filters{display:flex;flex-wrap:wrap;gap:8px;margin:0 0 18px}.filter-chip{border:none;cursor:pointer;padding:8px 12px;border-radius:999px;background:rgba(17,17,17,.04);color:var(--text);font-size:11px;letter-spacing:.05em;transition:all .22s ease}.filter-chip:hover{transform:translateY(-1px);background:rgba(17,17,17,.07)}.filter-chip.active{background:#111;color:#fff}.strip{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:14px}.card{display:flex;flex-direction:column;background:var(--panel);border-radius:20px;overflow:hidden;box-shadow:var(--shadow);transition:transform .24s ease, box-shadow .24s ease}.card:hover{transform:translateY(-3px);box-shadow:0 14px 34px rgba(0,0,0,.08)}.poster{aspect-ratio:1/1;color:#fff;padding:12px;display:flex;align-items:flex-end}.poster-title{font-size:clamp(12px,1.02vw,18px);line-height:1.08;letter-spacing:-.03em;font-weight:600;max-width:7em}.body{padding:11px 11px 12px;display:flex;flex-direction:column;gap:7px;flex:1}.kicker{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--soft);font-weight:600}.name{margin:0;font-size:13px;line-height:1.18;letter-spacing:-.02em;font-weight:600}.summary{margin:0;font-size:11px;line-height:1.5;color:var(--soft);flex:1;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}.meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:auto}.tag{padding:6px 9px;border-radius:999px;background:rgba(17,17,17,.05);font-size:10px;letter-spacing:.04em;color:var(--text)}.empty{padding:30px 0;color:var(--soft)}@media (max-width:1400px){.strip{grid-template-columns:repeat(5,minmax(0,1fr))}}@media (max-width:1180px){.hero{grid-template-columns:1fr}.hero-copy{min-height:auto;padding-right:0}.hero-panel{min-height:auto;max-width:none}.strip{grid-template-columns:repeat(4,minmax(0,1fr))}}@media (max-width:920px){.strip{grid-template-columns:repeat(3,minmax(0,1fr))}}@media (max-width:720px){.page{padding:22px 16px 44px}.topbar-inner{padding:12px 16px}.hero{gap:14px;margin-bottom:18px;align-items:center}.hero-copy{min-height:auto;justify-content:center;align-self:center;padding:0}.eyebrow{margin-bottom:8px}.hero-title{font-size:clamp(28px,9vw,40px);max-width:12em}.hero-panel{padding:16px 16px 14px;min-height:148px;max-width:none;justify-content:center;align-self:center}.panel-label{margin-bottom:8px}.panel-quote{font-size:19px;max-width:100%}.toolbar{justify-content:center}.section-title{width:100%;font-size:20px;text-align:center}.search-box{flex:0 0 260px;max-width:260px}.filters{justify-content:center}.strip{grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.poster{padding:10px}.poster-title{font-size:14px;max-width:8em}.body{padding:10px 10px 11px}.name{font-size:13px}}@media (max-width:520px){.strip{grid-template-columns:1fr}.summary{-webkit-line-clamp:4}}</style></head><body><header class="topbar"><div class="topbar-inner"><a class="brand" href="index.html">Tankey ❤️ Monody</a><nav class="nav"><a href="index.html">首页</a><a href="photo.html">照片</a><a href="notes.html">碎碎念</a><a href="movie.html" class="">Movie</a><a href="music.html" class="active">Music</a></nav></div></header><main class="page"><section class="hero"><div class="hero-copy"><div class="eyebrow">Music</div><h1 class="hero-title">把喜欢的音乐，放在一起。</h1></div><div class="hero-panel"><div><div class="panel-label">A quiet archive</div><div class="panel-quote" id="archive-quote">Without music, life would be a mistake.</div><div class="panel-source" id="archive-source">尼采</div></div></div></section><div class="stats" id="stats"></div><section class="section"><div class="toolbar"><h2 class="section-title">最新</h2></div><section class="strip" id="trending-grid"></section></section><section class="section"><div class="toolbar"><h2 class="section-title">经典归档</h2><label class="search-box"><span class="search-icon">⌕</span><input id="search-input" type="search" placeholder="搜索音乐、艺人、标签或类型" autocomplete="off" /></label></div><section class="filters" id="filters"></section><section class="strip" id="main-grid"></section></section></main><script>const archiveQuotes=[{quote:'电影不仅拍下世界，也拍下我们看世界的方式。',source:'安德烈·巴赞 · 电影评论家'},{quote:'电影是每秒二十四格的真相。',source:'让-吕克·戈达尔 · 导演'},{quote:'Without music, life would be a mistake.',source:'尼采'},{quote:'Where words fail, music speaks.',source:'安徒生'}];const filterOptions=["全部", "华语", "粤语", "英语", "西班牙语", "韩语", "日语", "法语", "古典", "纯音乐", "电影原声", "流行", "摇滚", "民谣", "爵士", "拉丁", "香颂"];let activeFilter='全部',allData=[],trendingData=[];function rotateArchiveQuote(){const q=document.getElementById('archive-quote'),s=document.getElementById('archive-source');const item=archiveQuotes[Math.floor(Math.random()*archiveQuotes.length)];q.textContent=item.quote;s.textContent=item.source;}function renderStats(){document.getElementById('stats').innerHTML=`<span class="stat-pill">共 ${allData.length} 个音乐</span><span class="stat-pill">最新 ${trendingData.length} 个</span>`;}function renderFilters(){const box=document.getElementById('filters');box.innerHTML=filterOptions.map(tag=>`<button class="filter-chip ${tag===activeFilter?'active':''}" data-tag="${tag}">${tag}</button>`).join('');box.querySelectorAll('.filter-chip').forEach(btn=>btn.addEventListener('click',()=>{activeFilter=btn.dataset.tag;applyFilters();}));}function card(item){const tags=(item.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('');const query=encodeURIComponent([item.title,item.artist,item.language].filter(Boolean).join(' '));const doubanUrl=item.doubanUrl||`https://music.douban.com/subject_search?search_text=${query}`;const posterStyle=item.posterUrl?`background-image:linear-gradient(180deg, rgba(0,0,0,.08), rgba(0,0,0,.24)), url('${item.posterUrl}');background-size:cover;background-position:center;`: `background:${item.accent||'linear-gradient(135deg,#364456 0%,#121820 100%)'}`;return `<a class="card" href="${doubanUrl}" target="_blank" rel="noopener noreferrer"><div class="poster" style="${posterStyle}"><div class="poster-title">${item.title}</div></div><div class="body"><div class="kicker">${item.artist||''}</div><h3 class="name">${item.title}</h3><p class="summary">${item.summary||item.note||''}</p><div class="meta"><span class="tag">艺人 · ${item.artist||item.note||''}</span>${tags}</div></div></a>`;}function renderTrending(){document.getElementById('trending-grid').innerHTML=trendingData.map(card).join('')||'<div class="empty">暂时还没有最新内容。</div>';}function applyFilters(){const q=document.getElementById('search-input').value.trim().toLowerCase();const list=allData.filter(item=>{const tags=item.tags||[];const hitFilter=activeFilter==='全部'||tags.includes(activeFilter)||item.language===activeFilter||item.genre===activeFilter;const hitSearch=!q||Object.values(item).join(' ').toLowerCase().includes(q);return hitFilter&&hitSearch;});renderFilters();document.getElementById('main-grid').innerHTML=list.map(card).join('')||'<div class="empty">没有找到匹配内容。</div>';}Promise.all([fetch('data/music.json').then(r=>r.json()),fetch('data/music-trending.json').then(r=>r.json())]).then(([main,trend])=>{allData=main;trendingData=trend;rotateArchiveQuote();renderStats();renderTrending();applyFilters();document.getElementById('search-input').addEventListener('input',applyFilters);}).catch(()=>{document.getElementById('main-grid').innerHTML='<div class="empty">加载失败。</div>';});</script></body></html>
