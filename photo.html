<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Tankey ❤️ Monody</title>
  <link rel="icon" href="./love.png" />
  <link rel="shortcut icon" href="./love.png" />
  <style>
    :root { --bg:#f5f5f7; --text:#111; --text-soft:#6e6e73; --shadow:0 12px 36px rgba(0,0,0,.06); --radius:22px; --content:1380px; }
    *{box-sizing:border-box} html{scroll-behavior:smooth} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","PingFang SC","Helvetica Neue",sans-serif;color:var(--text);background:radial-gradient(circle at top,rgba(255,255,255,.96) 0%,rgba(255,255,255,.42) 24%,rgba(245,245,247,1) 58%),linear-gradient(180deg,#fafafd 0%,var(--bg) 100%);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
    a{color:inherit;text-decoration:none} img{display:block;max-width:100%}
    .topbar{position:sticky;top:0;z-index:50;backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);background:rgba(245,245,247,.78);border-bottom:1px solid rgba(17,17,17,.04)}
    .topbar-inner{max-width:var(--content);margin:0 auto;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px}
    .brand{font-size:14px;letter-spacing:.08em;white-space:nowrap}.nav{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end}.nav a{font-size:13px;color:var(--text-soft);padding:10px 14px;border-radius:999px;transition:background .25s ease,color .25s ease}.nav a:hover,.nav a.active{background:rgba(17,17,17,.05);color:var(--text)}
    .hero{max-width:1120px;margin:0 auto;padding:56px 24px 26px;text-align:center}.hero-title{margin:0;font-size:clamp(36px,7vw,84px);line-height:1.04;letter-spacing:-.05em;font-weight:600;text-wrap:balance}.hero-desc{margin:18px auto 0;max-width:820px;font-size:clamp(16px,2vw,22px);line-height:1.65;color:var(--text-soft);text-wrap:balance}
    .gallery-wrap{max-width:var(--content);margin:0 auto;padding:12px 24px 72px}.masonry{column-count:4;column-gap:16px}.photo-card{position:relative;display:block;width:100%;margin:0 0 16px;break-inside:avoid;border-radius:var(--radius);overflow:hidden;background:white;box-shadow:var(--shadow);transform:translateY(0);transition:transform .35s ease,box-shadow .35s ease}.photo-card:hover{transform:translateY(-3px);box-shadow:0 16px 42px rgba(0,0,0,.1)}.photo-card img{width:100%;height:auto;display:block;object-fit:cover;transition:transform .55s ease;content-visibility:auto}.photo-card:hover img{transform:scale(1.018)}
    .footer-note{max-width:880px;margin:0 auto;padding:0 24px 44px;text-align:center;font-size:14px;line-height:1.8;color:var(--text-soft)}
    @media (max-width:1200px){.masonry{column-count:3}} @media (max-width:820px){.hero{padding:42px 18px 20px}.gallery-wrap{padding:8px 18px 56px}.masonry{column-count:2;column-gap:12px}.photo-card{margin-bottom:12px;border-radius:18px}} @media (max-width:520px){.topbar-inner{padding:12px 16px}.brand{font-size:13px}.nav a{font-size:12px;padding:8px 10px}.hero{padding:34px 16px 16px}.hero-title{font-size:clamp(30px,12vw,52px)}.hero-desc{font-size:14px;max-width:20em}.gallery-wrap{padding:6px 12px 44px}.masonry{column-count:2;column-gap:10px}.photo-card{margin-bottom:10px;border-radius:16px}.footer-note{padding:0 16px 36px}}
  </style>
</head>
<body>
  <header class="topbar"><div class="topbar-inner"><a class="brand" href="index.html">Tankey ❤️ Monody</a><nav class="nav"><a href="index.html">首页</a><a href="photo.html" class="active">照片</a><a href="notes.html">碎碎念</a></nav></div></header>
  <section class="hero"><h1 class="hero-title">光落在旧照片上，时间就有了形状。</h1><p class="hero-desc">有些瞬间不说话，也足够长久。</p></section>
  <main class="gallery-wrap" id="gallery"><section class="masonry" id="gallery-grid"></section></main>
  <div class="footer-note">有些照片不是拍得多专业，只是那一刻刚好不想忘。</div>
  <script src="assets/js/photo-data.js"></script>
  <script>
    const photos = window.PHOTO_DATA || [];
    const grid = document.getElementById('gallery-grid');
    grid.innerHTML = photos.map((photo, index) => `<a class="photo-card" href="photo-detail.html?photo=${encodeURIComponent(photo.id)}"><img src="${photo.full}" alt="${photo.title || photo.file}" loading="lazy" decoding="async" fetchpriority="${index < 2 ? 'high' : 'auto'}" width="${photo.width || ''}" height="${photo.height || ''}" /></a>`).join('');
  </script>
</body>
</html>
