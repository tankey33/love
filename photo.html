			.meta-item {
				display: flex;
				justify-content: space-between;

				background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.03));

			}
			.meta-item span:first-child { color: rgba(255,255,255,0.58); }

			.viewer-strip {
				grid-column: 1 / span 2;
				display: flex;
				gap: 0.75rem;
				overflow-x: auto;
				padding: 0.95rem;
				scrollbar-width: none;
			}

			.viewer-strip::-webkit-scrollbar { display: none; }

			.thumb-btn {
				flex: 0 0 auto;
				width: 96px;
				height: 72px;
				padding: 0;

				border: 1px solid rgba(255,255,255,0.05);

				cursor: pointer;
				opacity: 0.7;
				transform: scale(0.98);

			}
			.thumb-btn.active {
				border-color: rgba(255,255,255,0.22);
				opacity: 1;
				transform: scale(1);
			}
			.thumb-btn img { width: 100%; height: 100%; object-fit: cover; display:block; }

			@media screen and (max-width: 1100px) {
				#main.gallery-shell {

			@media screen and (max-width: 900px) {
				#main.gallery-shell {

				.meta-item {

				}

		<script>
			const photos = [
				{ file:'01.jpg', full:'images/fulls/01.jpg', thumb:'images/thumbs/01.jpg', width:6000, height:4000, size:2337002, title:'Magna feugiat lorem', description:'Nunc blandit nisi ligula magna sodales lectus elementum non. Integer id venenatis velit.' },
				{ file:'02.jpg', full:'images/fulls/02.jpg', thumb:'images/thumbs/02.jpg', width:4096, height:3072, size:1108767, title:'Nisl adipiscing', description:'Nunc blandit nisi ligula magna sodales lectus elementum non. Integer id venenatis velit.' },
				{ file:'03.jpg', full:'images/fulls/03.jpg', thumb:'images/thumbs/03.jpg', width:4096, height:3072, size:1152455, title:'Tempus aliquam veroeros', description:'Nunc blandit nisi ligula magna sodales lectus elementum non. Integer id venenatis velit.' },
				{ file:'04.jpg', full:'images/fulls/04.jpg', thumb:'images/thumbs/04.jpg', width:4096, height:3072, size:1034990, title:'Aliquam ipsum sed dolore', description:'Nunc blandit nisi ligula magna sodales lectus elementum non. Integer id venenatis velit.' },
				{ file:'05.jpg', full:'images/fulls/05.jpg', thumb:'images/thumbs/05.jpg', width:3830, height:2873, size:1109075, title:'Cursis aliquam nisl', description:'Nunc blandit nisi ligula magna sodales lectus elementum non. Integer id venenatis velit.' },
				{ file:'06.jpg', full:'images/fulls/06.jpg', thumb:'images/thumbs/06.jpg', width:3072, height:4096, size:1514277, title:'Sed consequat phasellus', description:'Nunc blandit nisi ligula magna sodales lectus elementum non. Integer id venenatis velit.' },
				{ file:'07.jpg', full:'images/fulls/07.jpg', thumb:'images/thumbs/07.jpg', width:1024, height:583, size:40195, title:'Mauris id tellus arcu', description:'Nunc blandit nisi ligula magna sodales lectus elementum non. Integer id venenatis velit.' },
				{ file:'08.jpg', full:'images/fulls/08.jpg', thumb:'images/thumbs/08.jpg', width:1024, height:583, size:37885, title:'Nunc vehicula id nulla', description:'Nunc blandit nisi ligula magna sodales lectus elementum non. Integer id venenatis velit.' },
				{ file:'09.jpg', full:'images/fulls/09.jpg', thumb:'images/thumbs/09.jpg', width:1024, height:683, size:46962, title:'Neque et faucibus viverra', description:'Nunc blandit nisi ligula magna sodales lectus elementum non. Integer id venenatis velit.' },
				{ file:'10.jpg', full:'images/fulls/10.jpg', thumb:'images/thumbs/10.jpg', width:1024, height:583, size:41147, title:'Mattis ante fermentum', description:'Nunc blandit nisi ligula magna sodales lectus elementum non. Integer id venenatis velit.' },
				{ file:'11.jpg', full:'images/fulls/11.jpg', thumb:'images/thumbs/11.jpg', width:1024, height:583, size:42607, title:'Sed ac elementum arcu', description:'Nunc blandit nisi ligula magna sodales lectus elementum non. Integer id venenatis velit.' },
				{ file:'12.jpg', full:'images/fulls/12.jpg', thumb:'images/thumbs/12.jpg', width:1024, height:583, size:39947, title:'Vehicula id nulla dignissim', description:'Nunc blandit nisi ligula magna sodales lectus elementum non. Integer id venenatis velit.' }
			];

			const el = {
				image: document.getElementById('viewer-image'),
				counter: document.getElementById('viewer-counter'),
				title: document.getElementById('photo-title'),
				desc: document.getElementById('photo-description'),
				file: document.getElementById('meta-file'),
				resolution: document.getElementById('meta-resolution'),
				size: document.getElementById('meta-size'),
				device: document.getElementById('meta-device'),
				exif: document.getElementById('meta-exif'),
				strip: document.getElementById('viewer-strip')
			};

			const prettySize = (bytes) => {
				const units = ['B','KB','MB','GB'];
				let n = bytes, i = 0;
				while (n >= 1024 && i < units.length - 1) { n /= 1024; i++; }
				return `${n.toFixed(i === 0 ? 0 : 1)} ${units[i]}`;
			};

			let current = 0;

			function renderThumbs() {
				el.strip.innerHTML = '';
				photos.forEach((photo, index) => {
					const btn = document.createElement('button');
					btn.className = 'thumb-btn' + (index === current ? ' active' : '');
					btn.type = 'button';
					btn.innerHTML = `<img src="${photo.thumb}" alt="${photo.title}">`;
					btn.addEventListener('click', () => setPhoto(index));
					el.strip.appendChild(btn);
				});
			}

			function preloadNearby(index) {
				[-1, 1].forEach((offset) => {
					const p = photos[(index + offset + photos.length) % photos.length];
					const img = new Image();
					img.src = p.full;
				});
			}

			function setPhoto(index) {
				current = (index + photos.length) % photos.length;
				const p = photos[current];
				el.image.classList.add('is-loading');
				const nextImage = new Image();
				nextImage.onload = function() {
					el.image.src = p.full;
					el.image.alt = p.title;
					requestAnimationFrame(() => el.image.classList.remove('is-loading'));
				};
				nextImage.src = p.full;
				el.counter.textContent = `${current + 1} / ${photos.length}`;
				el.title.textContent = p.title;
				el.desc.textContent = p.description || '—';
				el.file.textContent = p.file;
				el.resolution.textContent = `${p.width} × ${p.height}`;
				el.size.textContent = prettySize(p.size);
				el.device.textContent = p.width >= 3000 ? 'High resolution image' : 'Web image';
				el.exif.textContent = 'No embedded EXIF in current source files';
				renderThumbs();
				const active = el.strip.querySelector('.thumb-btn.active');
				if (active) active.scrollIntoView({ inline: 'center', block: 'nearest', behavior: 'smooth' });
				preloadNearby(current);
			}

			document.querySelector('.viewer-nav.prev').addEventListener('click', () => setPhoto(current - 1));
			document.querySelector('.viewer-nav.next').addEventListener('click', () => setPhoto(current + 1));
			document.addEventListener('keydown', (e) => {
				if (e.key === 'ArrowLeft') setPhoto(current - 1);
				if (e.key === 'ArrowRight') setPhoto(current + 1);
			});

			let startX = null;
			el.image.addEventListener('touchstart', (e) => { startX = e.changedTouches[0].clientX; }, { passive: true });
			el.image.addEventListener('touchend', (e) => {
				if (startX == null) return;
				const delta = e.changedTouches[0].clientX - startX;
				if (Math.abs(delta) > 40) setPhoto(current + (delta < 0 ? 1 : -1));
				startX = null;
			}, { passive: true });

			setPhoto(0);
		</script>
