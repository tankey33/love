      ['黑客帝国','The Matrix',1999,'Lana Wachowski / Lilly Wachowski','9.1',['世界百大电影','科幻','动作']],
      ['异形','Alien',1979,'Ridley Scott','8.3',['科幻','惊悚']],
      ['异形2','Aliens',1986,'James Cameron','8.1',['科幻','动作']],
      ['终结者2','Terminator 2: Judgment Day',1991,'James Cameron','8.8',['科幻','动作']],
      ['疯狂的麦克斯4：狂暴之路','Mad Max: Fury Road',2015,'George Miller','8.7',['动作','科幻','冒险']],
      ['七宗罪','Se7en',1995,'David Fincher','8.8',['犯罪','惊悚']],
      ['搏击俱乐部','Fight Club',1999,'David Fincher','9.0',['世界百大电影','剧情','犯罪']],
      ['社交网络','The Social Network',2010,'David Fincher','8.2',['剧情','传记']],
      ['消失的爱人','Gone Girl',2014,'David Fincher','8.7',['悬疑','惊悚']],
      ['无耻混蛋','Inglourious Basterds',2009,'Quentin Tarantino','8.7',['战争','犯罪','喜剧']],
      ['被解救的姜戈','Django Unchained',2012,'Quentin Tarantino','8.8',['西部','犯罪','动作']],
      ['好家伙','Goodfellas',1990,'Martin Scorsese','8.6',['世界百大电影','犯罪','剧情']],
      ['华尔街之狼','The Wolf of Wall Street',2013,'Martin Scorsese','8.1',['喜剧','犯罪','传记']],
      ['爱在黎明破晓前','Before Sunrise',1995,'Richard Linklater','8.8',['爱情','文艺']],
      ['爱在日落黄昏时','Before Sunset',2004,'Richard Linklater','8.9',['爱情','文艺']],
      ['爱在午夜降临前','Before Midnight',2013,'Richard Linklater','8.9',['爱情','文艺']],
      ['她','Her',2013,'Spike Jonze','8.4',['爱情','科幻','文艺']],
      ['白日梦想家','The Secret Life of Walter Mitty',2013,'Ben Stiller','8.5',['喜剧','冒险','治愈']],
      ['触不可及','The Intouchables',2011,'Olivier Nakache / Éric Toledano','9.3',['喜剧','剧情']],
      ['布达佩斯大饭店','The Grand Budapest Hotel',2014,'Wes Anderson','8.9',['喜剧','犯罪','文艺']],

      ['刺客聂隐娘','The Assassin',2015,'侯孝贤','7.4',['武侠','文艺','华语']],

      ['卧虎藏龙：青冥宝剑','Crouching Tiger, Hidden Dragon: Sword of Destiny',2016,'袁和平','6.0',['武侠','动作','华语']]
    ];

    const movieData = rawMovies.map((item, index) => {
      const [title, english, year, director, rating, tags] = item;
      const slug = english.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '') || `movie-${index+1}`;
      return {
        slug,
        title,
        english,
        year: String(year),
        director,
        rating,
        tags,
        summary: `${title} · ${tags.slice(0,3).join(' / ')}`,
        note: `${director} · ${year}`,
        accent: palette[index % palette.length]
      };
    });

    const filterOptions = ['全部','世界百大电影','奥斯卡电影','金马奖电影','喜剧','武侠','爱情','科幻','剧情','动作','动画','犯罪','家庭','奇幻','战争','文艺','华语'];
    let activeFilter = '全部';

    function renderStats(){
      const total = movieData.length;
      const oscar = movieData.filter(m => m.tags.includes('奥斯卡电影')).length;
      const top100 = movieData.filter(m => m.tags.includes('世界百大电影')).length;
      const goldenHorse = movieData.filter(m => m.tags.includes('金马奖电影')).length;
      document.getElementById('stats').innerHTML = `
        <span class="stat-pill">共 ${total} 部</span>
        <span class="stat-pill">世界百大 ${top100} 部</span>
        <span class="stat-pill">奥斯卡 ${oscar} 部</span>
        <span class="stat-pill">金马奖 ${goldenHorse} 部</span>`;
    }

    function renderFilters() {
      const box = document.getElementById('filters');
      box.innerHTML = filterOptions.map(tag => `<button class="filter-chip ${tag === activeFilter ? 'active' : ''}" data-tag="${tag}">${tag}</button>`).join('');
      box.querySelectorAll('.filter-chip').forEach(btn => btn.addEventListener('click', () => { activeFilter = btn.dataset.tag; applyFilters(); }));
    }

    function renderFeatured(movie) {
      if (!movie) return '';
      return `
        <a class="featured" href="#${movie.slug}">
          <div class="featured-media" style="background:${movie.accent}">
            <div class="featured-kicker">Featured movie</div>
            <h2 class="featured-name">${movie.title}</h2>
            <p class="featured-sub">${movie.english} · ${movie.year}</p>
            <div class="tag-row">${movie.tags.slice(0,4).map(tag => `<span class="tag tag-soft">${tag}</span>`).join('')}</div>
          </div>
          <div class="featured-copy">
            <div>
              <p class="featured-text">${movie.summary}</p>
              <div class="meta-grid">
                <div class="meta-item"><small>导演</small><span>${movie.director}</span></div>
                <div class="meta-item"><small>评分</small><span>${movie.rating}</span></div>
                <div class="meta-item"><small>标签</small><span>${movie.tags.join(' · ')}</span></div>
                <div class="meta-item"><small>索引</small><span>${movie.note}</span></div>
              </div>
            </div>
          </div>
        </a>`;
    }

    function renderGrid(list) {
      const grid = document.getElementById('movie-grid');
      if (!list.length) {
        grid.innerHTML = '<div class="empty">没有找到匹配的电影。</div>';
        return;
      }
      grid.innerHTML = list.map(movie => `
        <article class="movie-card" id="${movie.slug}">
          <div class="movie-poster" style="background:${movie.accent}">
            <div class="poster-title">${movie.title}</div>
          </div>
          <div class="movie-body">
            <div class="movie-kicker">${movie.english} · ${movie.year}</div>
            <h3 class="movie-title">${movie.title}</h3>
            <p class="movie-summary">${movie.summary}</p>
            <div class="movie-meta">
              <span class="tag">导演 · ${movie.director}</span>
              <span class="tag">评分 · ${movie.rating}</span>
              ${movie.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
            </div>
          </div>
        </article>`).join('');
    }

    function applyFilters() {
      const q = document.getElementById('search-input').value.trim().toLowerCase();
      const list = movieData.filter(movie => {
        const hitFilter = activeFilter === '全部' || movie.tags.includes(activeFilter);
        const hitSearch = !q || [movie.title, movie.english, movie.year, movie.director, movie.summary, movie.note, movie.tags.join(' ')].join(' ').toLowerCase().includes(q);
        return hitFilter && hitSearch;
      });
      renderFilters();
      document.getElementById('featured').innerHTML = renderFeatured(list[0]);
      renderGrid(list);
    }

    document.getElementById('search-input').addEventListener('input', applyFilters);
    renderStats();
    applyFilters();
  </script>
</body>
