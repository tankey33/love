<h1>夜里安静下来以后，句子会慢一点落下来</h1>
<p><img src="https://images.unsplash.com/photo-1500534314209-a25ddb2bd429?auto=format&amp;fit=crop&amp;w=1600&amp;q=80" alt="夜晚写作"></p>
<p>白天写东西像是在赶路，到了夜里，文字才更像是慢慢靠近自己。不是灵感更多了，而是外面的声音终于少下来，能听见自己原本在想什么。</p>
<p>有些句子只适合夜里写，因为它们白天会显得太直白，太急，太像解释。夜里不一样，夜里更像允许你把那些还没想清楚的东西先轻轻放下来。</p>
