<h1>我是怎么整理照片的：文件夹、顺序和长期保存</h1>
<p><img src="https://images.unsplash.com/photo-1470229538611-16ba8c7ffbd7?auto=format&amp;fit=crop&amp;w=1600&amp;q=80" alt="照片整理示意"></p>
<p>真正让照片变得容易回看的，不是滤镜，而是整理方式本身。只要规则足够简单，你以后才会愿意持续做下去。</p>
<p>我的习惯一般是：</p>
<ul>
<li>文件夹尽量简单</li>
<li>命名规则不要太复杂</li>
<li>原图和展示图分层</li>
<li>定期做备份</li>
</ul>
<p>照片的价值往往不在拍下来的那一天，而在很多年后你还能不能很快找到它。</p>
