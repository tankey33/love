<h1>第一篇碎碎念</h1>
<p><img src="images/fulls/01.jpg" alt="第一张演示图片"></p>
<p>这是一个示例文件。</p>
<p>以后你只需要：</p>
<ol>
<li>新建一个 <code>.md</code> 文件</li>
<li>丢进 <code>blog/posts/</code></li>
<li>推到 GitHub</li>
</ol>
<p>页面就会自动识别它，并在 <strong>碎碎念</strong> 页面里显示出来。</p>
<h2>为什么要这样做</h2>
<p>把写作入口保留成最简单的 <code>.md</code>，会比每次都手动改网页舒服很多。你只要专心写内容，页面本身会自动完成生成、渲染和上线。</p>
<p><img src="images/fulls/05.jpg" alt="第二张演示图片"></p>
<blockquote><p>风格会保持成简约、理性、偏包豪斯的排版。</p></blockquote>
