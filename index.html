<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Tankey ❤️ Monody</title>
    <link rel="icon" href="./love.png">
    <link rel="shortcut icon" href="./love.png">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <style>
        :root {
            --text-main: rgba(255,255,255,0.96);
            --text-soft: rgba(255,255,255,0.70);
            --glass: rgba(255,255,255,0.10);
            --glass-strong: rgba(255,255,255,0.16);
            --line: rgba(255,255,255,0.16);
            --shadow: 0 20px 60px rgba(0,0,0,0.16);
        }

        * { box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            margin: 0;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "PingFang SC", "Helvetica Neue", sans-serif;
            color: var(--text-main);
            background: linear-gradient(180deg, #c8e7dd 0%, #6a9fb0 48%, #3a6987 100%);
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
        }

        body.body--ready {
            background:
                radial-gradient(circle at top, rgba(255,255,255,0.34) 0%, rgba(255,255,255,0.10) 26%, transparent 52%),
                linear-gradient(180deg, #d5efe2 0%, #6ea5b7 44%, #386382 100%);
        }

        .canvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            display: block;
        }

        .hero-shell {
            position: fixed;
            inset: 0;
            z-index: 10;
            pointer-events: none;
            padding: max(20px, env(safe-area-inset-top)) 20px max(24px, env(safe-area-inset-bottom)) 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .topbar {
            display: flex;
            justify-content: center;
        }

        .top-pill {
            pointer-events: auto;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 10px 16px;
            border-radius: 999px;
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.18);
            backdrop-filter: blur(18px) saturate(140%);
            -webkit-backdrop-filter: blur(18px) saturate(140%);
            box-shadow: var(--shadow);
            font-size: 12px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.88);
        }

        .centerpiece {
            position: absolute;
            left: 50%;
            top: 68%;
            transform: translateX(-50%);
            width: min(92vw, 760px);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 18px;
        }

        .bottom-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            padding-bottom: max(8px, env(safe-area-inset-bottom));
        }

        .avatar-wrap {
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            margin-top: 18px;
            margin-bottom: 180px;
            z-index: 12;
        }

        #logo {
            width: clamp(120px, 18vw, 156px);
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: 999px;
            border: 3px solid rgba(255,255,255,0.74);
            box-shadow: 0 18px 48px rgba(35, 57, 88, 0.24);
            cursor: pointer;
            transition: transform 0.45s ease, box-shadow 0.45s ease, border-color 0.45s ease;
        }

        #logo:hover {
            transform: scale(1.045);
            box-shadow: 0 24px 58px rgba(255,255,255,0.16);
            border-color: rgba(255,255,255,0.98);
        }

        .enter-memory {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            border-radius: 999px;
            background: rgba(16,18,24,0.18);
            border: 1px solid rgba(255,255,255,0.20);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            font-size: 12px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.92);
            box-shadow: var(--shadow);
        }

        .quick-links {
            pointer-events: auto;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .quick-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 88px;
            padding: 10px 16px;
            border-radius: 999px;
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.18);
            backdrop-filter: blur(18px) saturate(140%);
            -webkit-backdrop-filter: blur(18px) saturate(140%);
            box-shadow: var(--shadow);
            font-size: 12px;
            letter-spacing: 0.10em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.92);
            transition: transform 0.25s ease, background 0.25s ease;
        }

        .quick-link:hover {
            transform: translateY(-1px);
            background: rgba(255,255,255,0.18);
        }

        .title-block {
            pointer-events: none;
        }

        .hero-title {
            margin: 0;
            font-size: clamp(40px, 7.2vw, 84px);
            line-height: 1.02;
            letter-spacing: -0.05em;
            font-weight: 700;
            font-family: "Snell Roundhand", "Apple Chancery", "Baskerville Italic", "Times New Roman", serif;
            font-style: italic;
            text-wrap: balance;
        }

        .hero-desc {
            margin: 10px auto 0;
            max-width: 34em;
            font-size: clamp(14px, 1.8vw, 18px);
            line-height: 1.4;
            letter-spacing: -0.01em;
            color: var(--text-soft);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .bottom-bar {
            position: absolute;
            left: 20px;
            right: 20px;
            bottom: max(22px, env(safe-area-inset-bottom));
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: end;
            gap: 12px;
        }

        .love-time {
            justify-self: center;
            pointer-events: none;
            text-align: center;
        }

        .love-time .label {
            font-size: 12px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.72);
            margin-bottom: 8px;
        }

        .love-time .value {
            font-size: clamp(15px, 2vw, 20px);
            line-height: 1.7;
            color: rgba(255,255,255,0.96);
        }

        .music-btn {
            justify-self: end;
            pointer-events: auto;
            width: 48px;
            height: 48px;
            border: none;
            border-radius: 999px;
            background: var(--glass);
            border: 1px solid var(--line);
            color: white;
            font-size: 18px;
            cursor: pointer;
            backdrop-filter: blur(18px) saturate(140%);
            -webkit-backdrop-filter: blur(18px) saturate(140%);
            box-shadow: var(--shadow);
            transition: transform 0.25s ease, background 0.25s ease, opacity 0.25s ease;
        }

        .music-btn:hover {
            transform: scale(1.04);
            background: var(--glass-strong);
        }

        .blank-slot { min-height: 48px; }

        @media (max-width: 720px) {
            .hero-shell {
                padding: max(16px, env(safe-area-inset-top)) 16px max(18px, env(safe-area-inset-bottom)) 16px;
            }

            .centerpiece {
                top: 70%;
                width: min(94vw, 560px);
                gap: 14px;
            }

            .avatar-wrap {
                margin-top: 16px;
                margin-bottom: 110px;
            }

            .enter-memory,
            .top-pill {
                font-size: 11px;
                letter-spacing: 0.10em;
            }

            .hero-title {
                font-size: clamp(34px, 9vw, 56px);
            }

            .hero-desc {
                max-width: 18em;
                font-size: 13px;
            }

            .bottom-bar {
                left: 16px;
                right: 16px;
                grid-template-columns: 1fr;
                justify-items: center;
                gap: 16px;
            }

            .blank-slot { display: none; }
            .music-btn { justify-self: center; }
        }
    </style>
</head>
<body>
    <div class="hero-shell">
        <div class="topbar">
            <div class="top-pill">Tankey ❤️ Monody · Since 2017</div>
        </div>

        <div class="avatar-wrap">

            <div class="quick-links">

    <canvas class="canvas"></canvas>

    <audio id="bgm" loop>
        <source src="./music/white.mp3" type="audio/mpeg">
    </audio>

    <script>
        const logo = document.getElementById('logo');
        logo.addEventListener('click', function () {
            window.location.href = 'photo.html';
        });
    </script>

    <script>
        function show_date_time() {
            window.setTimeout(show_date_time, 1000);
            const BirthDay = new Date("12/29/2017 18:20:00");
            const today = new Date();
            const timeold = today.getTime() - BirthDay.getTime();
            const sectimeold = timeold / 1000;
            const secondsold = Math.floor(sectimeold);
            const msPerDay = 24 * 60 * 60 * 1000;
            const e_daysold = timeold / msPerDay;
            const daysold = Math.floor(e_daysold);
            const e_hrsold = (e_daysold - daysold) * 24;
            const hrsold = Math.floor(e_hrsold);
            const e_minsold = (e_hrsold - hrsold) * 60;
            const minsold = Math.floor((e_hrsold - hrsold) * 60);
            const seconds = Math.floor((e_minsold - minsold) * 60);
            document.getElementById('span_dt_dt').innerHTML = `${daysold}天 ${hrsold}小时 ${minsold}分 ${seconds}秒`;
        }
        show_date_time();
    </script>

    <script>
        var S = {
            init: function () {
                S.Drawing.init('.canvas');
                document.body.classList.add('body--ready');
                S.UI.simulate("❤昕昕|I|LOVE|You|3000|#countdown 3|#time");
                S.Drawing.loop(function () {
                    S.Shape.render();
                });
            }
        };

        S.Drawing = (function () {
            var canvas, context, renderFn,
                requestFrame = window.requestAnimationFrame ||
                    window.webkitRequestAnimationFrame ||
                    window.mozRequestAnimationFrame ||
                    window.oRequestAnimationFrame ||
                    window.msRequestAnimationFrame ||
                    function (callback) { window.setTimeout(callback, 1000 / 60); };

            return {
                init: function (el) {
                    canvas = document.querySelector(el);
                    context = canvas.getContext('2d');
                    this.adjustCanvas();
                    window.addEventListener('resize', function () { S.Drawing.adjustCanvas(); });
                },
                loop: function (fn) {
                    renderFn = !renderFn ? fn : renderFn;
                    this.clearFrame();
                    renderFn();
                    requestFrame.call(window, this.loop.bind(this));
                },
                adjustCanvas: function () {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                },
                clearFrame: function () {
                    context.clearRect(0, 0, canvas.width, canvas.height);
                },
                getArea: function () {
                    return {w: canvas.width, h: canvas.height};
                },
                drawCircle: function (p, c) {
                    context.fillStyle = c.render();
                    context.beginPath();
                    context.arc(p.x, p.y, p.z, 0, 2 * Math.PI, true);
                    context.closePath();
                    context.fill();
                }
            };
        }());

        S.UI = (function () {
            var interval, currentAction, time, maxShapeSize = 30, sequence = [], cmd = '#';

            function formatTime(date) {
                var h = date.getHours(), m = date.getMinutes();
                m = m < 10 ? '0' + m : m;
                return h + ':' + m;
            }

            function getValue(value) { return value && value.split(' ')[1]; }
            function getAction(value) {
                value = value && value.split(' ')[0];
                return value && value[0] === cmd && value.substring(1);
            }

            function timedAction(fn, delay, max, reverse) {
                clearInterval(interval);
                currentAction = reverse ? max : 1;
                fn(currentAction);
                if (!max || (!reverse && currentAction < max) || (reverse && currentAction > 0)) {
                    interval = setInterval(function () {
                        currentAction = reverse ? currentAction - 1 : currentAction + 1;
                        fn(currentAction);
                        if ((!reverse && max && currentAction === max) || (reverse && currentAction === 0)) {
                            clearInterval(interval);
                        }
                    }, delay);
                }
            }

            function performAction(value) {
                var action, current;
                sequence = typeof(value) === 'object' ? value : sequence.concat(value.split('|'));
                timedAction(function () {
                    current = sequence.shift();
                    action = getAction(current);
                    value = getValue(current);
                    switch (action) {
                        case 'countdown':
                            value = parseInt(value) || 10;
                            value = value > 0 ? value : 10;
                            timedAction(function (index) {
                                if (index === 0) {
                                    if (sequence.length === 0) {
                                        S.Shape.switchShape(S.ShapeBuilder.letter(''));
                                    } else {
                                        performAction(sequence);
                                    }
                                } else {
                                    S.Shape.switchShape(S.ShapeBuilder.letter(index), true);
                                }
                            }, 1000, value, true);
                            break;
                        case 'rectangle':
                            value = value && value.split('x');
                            value = (value && value.length === 2) ? value : [maxShapeSize, maxShapeSize / 2];
                            S.Shape.switchShape(S.ShapeBuilder.rectangle(Math.min(maxShapeSize, parseInt(value[0])), Math.min(maxShapeSize, parseInt(value[1]))));
                            break;
                        case 'circle':
                            value = parseInt(value) || maxShapeSize;
                            value = Math.min(value, maxShapeSize);
                            S.Shape.switchShape(S.ShapeBuilder.circle(value));
                            break;
                        case 'time':
                            var t = formatTime(new Date());
                            if (sequence.length > 0) {
                                S.Shape.switchShape(S.ShapeBuilder.letter(t));
                            } else {
                                timedAction(function () {
                                    t = formatTime(new Date());
                                    if (t !== time) {
                                        time = t;
                                        S.Shape.switchShape(S.ShapeBuilder.letter(time));
                                    }
                                }, 1000);
                            }
                            break;
                        default:
                            S.Shape.switchShape(S.ShapeBuilder.letter(current[0] === cmd ? 'HacPai' : current));
                    }
                }, 2000, sequence.length);
            }

            return { simulate: function (action) { performAction(action); } };
        }());

        S.Point = function (args) { this.x = args.x; this.y = args.y; this.z = args.z; this.a = args.a; this.h = args.h; };
        S.Color = function (r, g, b, a) { this.r = r; this.g = g; this.b = b; this.a = a; };
        S.Color.prototype = { render: function () { return 'rgba(' + this.r + ',' + this.g + ',' + this.b + ',' + this.a + ')'; } };

        S.Dot = function (x, y) {
            this.p = new S.Point({ x: x, y: y, z: 5, a: 1, h: 0 });
            this.e = 0.07;
            this.s = true;
            this.c = new S.Color(255, 255, 255, this.p.a);
            this.t = this.clone();
            this.q = [];
        };

        S.Dot.prototype = {
            clone: function () { return new S.Point({ x: this.x, y: this.y, z: this.z, a: this.a, h: this.h }); },
            _draw: function () { this.c.a = this.p.a; S.Drawing.drawCircle(this.p, this.c); },
            _moveTowards: function (n) {
                var details = this.distanceTo(n, true), dx = details[0], dy = details[1], d = details[2], e = this.e * d;
                if (this.p.h === -1) { this.p.x = n.x; this.p.y = n.y; return true; }
                if (d > 1) {
                    this.p.x -= ((dx / d) * e);
                    this.p.y -= ((dy / d) * e);
                } else {
                    if (this.p.h > 0) this.p.h--; else return true;
                }
                return false;
            },
            _update: function () {
                if (this._moveTowards(this.t)) {
                    var p = this.q.shift();
                    if (p) {
                        this.t.x = p.x || this.p.x;
                        this.t.y = p.y || this.p.y;
                        this.t.z = p.z || this.p.z;
                        this.t.a = p.a || this.p.a;
                        this.p.h = p.h || 0;
                    } else {
                        if (this.s) {
                            this.p.x -= Math.sin(Math.random() * 3.142);
                            this.p.y -= Math.sin(Math.random() * 3.142);
                        } else {
                            this.move(new S.Point({ x: this.p.x + (Math.random() * 50) - 25, y: this.p.y + (Math.random() * 50) - 25 }));
                        }
                    }
                }
                var d = this.p.a - this.t.a;
                this.p.a = Math.max(0.1, this.p.a - (d * 0.05));
                d = this.p.z - this.t.z;
                this.p.z = Math.max(1, this.p.z - (d * 0.05));
            },
            distanceTo: function (n, details) {
                var dx = this.p.x - n.x, dy = this.p.y - n.y, d = Math.sqrt(dx * dx + dy * dy);
                return details ? [dx, dy, d] : d;
            },
            move: function (p, avoidStatic) {
                if (!avoidStatic || (avoidStatic && this.distanceTo(p) > 1)) this.q.push(p);
            },
            render: function () { this._update(); this._draw(); }
        };

        S.ShapeBuilder = (function () {
            var gap = 13,
                shapeCanvas = document.createElement('canvas'),
                shapeContext = shapeCanvas.getContext('2d'),
                fontSize = 500,
                fontFamily = 'Avenir, Helvetica Neue, Helvetica, Arial, sans-serif';

            function fit() {
                shapeCanvas.width = Math.floor(window.innerWidth / gap) * gap;
                shapeCanvas.height = Math.floor(window.innerHeight / gap) * gap;
                shapeContext.fillStyle = 'red';
                shapeContext.textBaseline = 'middle';
                shapeContext.textAlign = 'center';
            }

            function processCanvas() {
                var pixels = shapeContext.getImageData(0, 0, shapeCanvas.width, shapeCanvas.height).data,
                    dots = [], x = 0, y = 0, fx = shapeCanvas.width, fy = shapeCanvas.height, w = 0, h = 0;
                for (var p = 0; p < pixels.length; p += (4 * gap)) {
                    if (pixels[p + 3] > 0) {
                        dots.push(new S.Point({ x: x, y: y }));
                        w = x > w ? x : w;
                        h = y > h ? y : h;
                        fx = x < fx ? x : fx;
                        fy = y < fy ? y : fy;
                    }
                    x += gap;
                    if (x >= shapeCanvas.width) {
                        x = 0; y += gap; p += gap * 4 * shapeCanvas.width;
                    }
                }
                return { dots: dots, w: w + fx, h: h + fy };
            }

            function setFontSize(s) { shapeContext.font = 'bold ' + s + 'px ' + fontFamily; }
            function isNumber(n) { return !isNaN(parseFloat(n)) && isFinite(n); }
            fit();
            window.addEventListener('resize', fit);

            return {
                circle: function (d) {
                    var r = Math.max(0, d) / 2;
                    shapeContext.clearRect(0, 0, shapeCanvas.width, shapeCanvas.height);
                    shapeContext.beginPath();
                    shapeContext.arc(r * gap, r * gap, r * gap, 0, 2 * Math.PI, false);
                    shapeContext.fill();
                    shapeContext.closePath();
                    return processCanvas();
                },
                letter: function (l) {
                    var s = 0;
                    setFontSize(fontSize);
                    s = Math.min(fontSize,
                        (shapeCanvas.width / shapeContext.measureText(l).width) * 0.8 * fontSize,
                        (shapeCanvas.height / fontSize) * (isNumber(l) ? 1 : 0.45) * fontSize);
                    setFontSize(s);
                    shapeContext.clearRect(0, 0, shapeCanvas.width, shapeCanvas.height);
                    shapeContext.fillText(l, shapeCanvas.width / 2, shapeCanvas.height / 2);
                    return processCanvas();
                },
                rectangle: function (w, h) {
                    var dots = [], width = gap * w, height = gap * h;
                    for (var y = 0; y < height; y += gap) {
                        for (var x = 0; x < width; x += gap) dots.push(new S.Point({ x: x, y: y }));
                    }
                    return { dots: dots, w: width, h: height };
                }
            };
        }());

        S.Shape = (function () {
            var dots = [], width = 0, height = 0, cx = 0, cy = 0;
            function compensate() {
                var a = S.Drawing.getArea();
                cx = a.w / 2 - width / 2;
                cy = a.h / 2 - height / 2;
            }
            return {
                switchShape: function (n, fast) {
                    var size, a = S.Drawing.getArea();
                    width = n.w; height = n.h; compensate();
                    if (n.dots.length > dots.length) {
                        size = n.dots.length - dots.length;
                        for (var d = 1; d <= size; d++) dots.push(new S.Dot(a.w / 2, a.h / 2));
                    }
                    var d = 0, i = 0;
                    while (n.dots.length > 0) {
                        i = Math.floor(Math.random() * n.dots.length);
                        dots[d].e = fast ? 0.25 : (dots[d].s ? 0.14 : 0.11);
                        if (dots[d].s) {
                            dots[d].move(new S.Point({ z: Math.random() * 20 + 10, a: Math.random(), h: 18 }));
                        } else {
                            dots[d].move(new S.Point({ z: Math.random() * 5 + 5, h: fast ? 18 : 30 }));
                        }
                        dots[d].s = true;
                        dots[d].move(new S.Point({ x: n.dots[i].x + cx, y: n.dots[i].y + cy, a: 1, z: 5, h: 0 }));
                        n.dots = n.dots.slice(0, i).concat(n.dots.slice(i + 1));
                        d++;
                    }
                    for (var j = d; j < dots.length; j++) {
                        if (dots[j].s) {
                            dots[j].move(new S.Point({ z: Math.random() * 20 + 10, a: Math.random(), h: 20 }));
                            dots[j].s = false;
                            dots[j].e = 0.04;
                            dots[j].move(new S.Point({ x: Math.random() * a.w, y: Math.random() * a.h, a: 0.3, z: Math.random() * 4, h: 0 }));
                        }
                    }
                },
                render: function () { for (var d = 0; d < dots.length; d++) dots[d].render(); }
            };
        }());

        S.init();
    </script>

    <script>
        const bgm = document.getElementById('bgm');
        const musicToggle = document.getElementById('musicToggle');
        let hasStartedByDoubleTap = false;

        function updateMusicButton() {
            musicToggle.style.opacity = bgm.paused ? '0.68' : '1';
        }

        async function startMusicOnce() {
            if (hasStartedByDoubleTap) return;
            hasStartedByDoubleTap = true;
            try {
                await bgm.play();
            } catch (e) {
                hasStartedByDoubleTap = false;
            }
            updateMusicButton();
        }

        document.body.addEventListener('dblclick', function () {
            startMusicOnce();
        });

        musicToggle.addEventListener('click', function (event) {
            event.stopPropagation();
            hasStartedByDoubleTap = true;
            if (bgm.paused) bgm.play(); else bgm.pause();
            updateMusicButton();
        });

        bgm.addEventListener('play', updateMusicButton);
        bgm.addEventListener('pause', updateMusicButton);
        updateMusicButton();
    </script>
</body>
</html>
